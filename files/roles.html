<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roles &amp; Permissions — GeniSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .page-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem; }
    .page-header-left h1 { font-size:1.6rem; font-weight:700; color:var(--text-primary); }
    .page-header-left p { color:var(--text-secondary); font-size:0.85rem; margin-top:0.15rem; }

    /* Stats */
    .role-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1.5rem; }
    .role-stat-card {
      background:var(--white); border-radius:var(--radius); padding:1.25rem 1.5rem;
      box-shadow:var(--shadow); display:flex; align-items:center; gap:1rem;
    }
    .role-stat-icon {
      width:44px; height:44px; border-radius:var(--radius-sm);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .role-stat-icon svg { width:22px; height:22px; }
    .role-stat-icon.purple  { background:var(--primary-light); color:var(--primary); }
    .role-stat-icon.teal    { background:var(--accent-light); color:var(--accent-dark); }
    .role-stat-icon.blue    { background:var(--info-light); color:var(--info-dark); }
    .role-stat-label { font-size:0.75rem; color:var(--text-secondary); font-weight:500; text-transform:uppercase; letter-spacing:0.04em; }
    .role-stat-value { font-size:1.5rem; font-weight:700; color:var(--text-primary); margin-top:0.1rem; }

    /* Roles grid */
    .roles-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:1rem; margin-bottom:1.5rem; }
    .role-card {
      background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow);
      padding:1.25rem 1.5rem; display:flex; flex-direction:column; gap:0.75rem;
      border:2px solid transparent; transition:var(--t); cursor:pointer;
    }
    .role-card:hover { border-color:var(--primary-light); box-shadow:var(--shadow-md); }
    .role-card.selected { border-color:var(--primary); }
    .role-card-top { display:flex; justify-content:space-between; align-items:flex-start; }
    .role-card-name { font-size:1rem; font-weight:700; color:var(--text-primary); }
    .role-card-slug { font-size:0.75rem; color:var(--text-muted); font-family:monospace; }
    .role-card-desc { font-size:0.82rem; color:var(--text-secondary); line-height:1.5; }
    .role-card-meta { display:flex; gap:0.75rem; align-items:center; font-size:0.78rem; color:var(--text-muted); }
    .role-card-meta .perm-count { font-weight:600; color:var(--primary); }
    .system-tag { font-size:0.65rem; font-weight:700; text-transform:uppercase; background:var(--warning-light); color:var(--warning-dark); padding:2px 8px; border-radius:4px; }
    .custom-tag { font-size:0.65rem; font-weight:700; text-transform:uppercase; background:var(--accent-light); color:var(--accent-dark); padding:2px 8px; border-radius:4px; }

    /* Permission editor panel */
    .perm-editor { background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .perm-editor-header {
      display:flex; justify-content:space-between; align-items:center;
      padding:1rem 1.5rem; border-bottom:1px solid var(--light-2);
    }
    .perm-editor-header h3 { font-size:1rem; font-weight:600; }
    .perm-editor-body { padding:1.25rem 1.5rem; }

    /* Module groups */
    .perm-module { margin-bottom:1.25rem; }
    .perm-module:last-child { margin-bottom:0; }
    .perm-module-header {
      display:flex; justify-content:space-between; align-items:center;
      padding:0.5rem 0; border-bottom:1px solid var(--light); margin-bottom:0.6rem;
    }
    .perm-module-name { font-size:0.85rem; font-weight:700; color:var(--text-primary); text-transform:capitalize; }
    .perm-module-toggle { font-size:0.72rem; color:var(--primary); cursor:pointer; font-weight:600; }
    .perm-module-toggle:hover { text-decoration:underline; }
    .perm-actions { display:flex; flex-wrap:wrap; gap:0.5rem; }
    .perm-check {
      display:flex; align-items:center; gap:0.4rem; font-size:0.82rem; color:var(--text-secondary);
      cursor:pointer; padding:0.3rem 0.6rem; border-radius:var(--radius-sm);
      border:1px solid var(--light-2); transition:var(--t); user-select:none;
    }
    .perm-check:hover { border-color:var(--primary-light); background:var(--primary-light); }
    .perm-check.checked { background:var(--primary); color:var(--white); border-color:var(--primary); }
    .perm-check input { display:none; }

    /* Role form in modal */
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:0.82rem; font-weight:600; color:var(--text-primary); margin-bottom:0.35rem; }
    .form-group input, .form-group textarea, .form-group select {
      width:100%; padding:0.6rem 0.85rem; border:1px solid var(--light-2);
      border-radius:var(--radius-sm); font-size:0.88rem; background:var(--white); transition:var(--t);
    }
    .form-group input:focus, .form-group textarea:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(var(--primary-rgb),0.08); }

    .perm-editor-footer { padding:1rem 1.5rem; border-top:1px solid var(--light-2); display:flex; justify-content:space-between; gap:0.5rem; }

    .empty-state { text-align:center; padding:4rem 2rem; }
    .empty-state h3 { font-size:1.1rem; font-weight:600; margin-bottom:0.5rem; }
    .empty-state p { color:var(--text-secondary); font-size:0.9rem; }

    @media (max-width:900px) { .role-stats { grid-template-columns:1fr; } .roles-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page" id="page-body"><div class="loading-spinner">Loading roles...</div></div>
  </div>
</div>

<!-- Create/Edit Role Modal -->
<div class="modal-overlay" id="roleModal">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h3 id="roleModalTitle">Create Role</h3>
      <button class="modal-close" onclick="closeModal('roleModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editRoleId">
      <div class="form-group">
        <label>Role Name *</label>
        <input id="roleName" class="form-control" placeholder="e.g. Campaign Manager">
      </div>
      <div class="form-group">
        <label>Slug *</label>
        <input id="roleSlug" class="form-control" placeholder="e.g. campaign_manager">
        <div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px">Lowercase, underscores only. Auto-generated from name.</div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="roleDesc" class="form-control" rows="2" placeholder="Brief description of this role..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('roleModal')">Cancel</button>
      <button class="btn btn-primary" id="roleModalSubmit" onclick="submitRole()">Create Role</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="shared.js"></script>
<script>
let allRoles = [];
let allPermissions = [];         // flat list
let groupedPermissions = {};     // { module: [perm, ...] }
let selectedRoleId = null;
let selectedRolePerms = new Set(); // permission IDs currently checked

document.addEventListener('DOMContentLoaded', () => {
  const user = requireLogin();
  if (!user) return;
  document.getElementById('sidebar').innerHTML = sidebarHTML('roles.html');
  document.getElementById('topbar').innerHTML = topbarHTML('Roles & Permissions');
  initPage('Roles & Permissions');
  loadAll();
});

async function loadAll() {
  try {
    const [roles, permData] = await Promise.all([
      apiGet('/roles'),
      apiGet('/roles/permissions/all')
    ]);
    allRoles = roles || [];
    allPermissions = permData.permissions || [];
    groupedPermissions = permData.grouped || {};
    renderPage();
  } catch (e) {
    document.getElementById('page-body').innerHTML =
      '<div class="empty-state"><p>' + escapeHtml(e.message) + '</p>' +
      '<button class="btn btn-primary" style="margin-top:1rem" onclick="loadAll()">Retry</button></div>';
  }
}

function renderPage() {
  const totalRoles = allRoles.length;
  const systemRoles = allRoles.filter(r => r.is_system).length;
  const customRoles = totalRoles - systemRoles;

  // Stats
  const statsHtml =
    '<div class="role-stats">' +
      '<div class="role-stat-card">' +
        '<div class="role-stat-icon purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>' +
        '<div><div class="role-stat-label">Total Roles</div><div class="role-stat-value">' + fmtNum(totalRoles) + '</div></div>' +
      '</div>' +
      '<div class="role-stat-card">' +
        '<div class="role-stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>' +
        '<div><div class="role-stat-label">System Roles</div><div class="role-stat-value">' + fmtNum(systemRoles) + '</div></div>' +
      '</div>' +
      '<div class="role-stat-card">' +
        '<div class="role-stat-icon teal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>' +
        '<div><div class="role-stat-label">Custom Roles</div><div class="role-stat-value">' + fmtNum(customRoles) + '</div></div>' +
      '</div>' +
    '</div>';

  // Role cards
  let cardsHtml = '';
  allRoles.forEach(r => {
    const tag = r.is_system
      ? '<span class="system-tag">System</span>'
      : '<span class="custom-tag">Custom</span>';
    const sel = selectedRoleId === r.id ? ' selected' : '';
    cardsHtml +=
      '<div class="role-card' + sel + '" onclick="selectRole(\'' + r.id + '\')">' +
        '<div class="role-card-top">' +
          '<div><div class="role-card-name">' + escapeHtml(r.name) + '</div>' +
          '<div class="role-card-slug">' + escapeHtml(r.slug) + '</div></div>' +
          tag +
        '</div>' +
        (r.description ? '<div class="role-card-desc">' + escapeHtml(r.description) + '</div>' : '') +
        '<div class="role-card-meta">' +
          '<span><span class="perm-count">' + (r.permission_count || 0) + '</span> permissions</span>' +
          '<span>Created ' + fmtDate(r.created_at) + '</span>' +
        '</div>' +
      '</div>';
  });

  // Permission editor (shown when a role is selected)
  let editorHtml = '';
  if (selectedRoleId) {
    const role = allRoles.find(r => r.id === selectedRoleId);
    if (role) {
      let modulesHtml = '';
      Object.keys(groupedPermissions).sort().forEach(mod => {
        const perms = groupedPermissions[mod];
        let checksHtml = '';
        perms.forEach(p => {
          const checked = selectedRolePerms.has(p.id) ? ' checked' : '';
          checksHtml +=
            '<label class="perm-check' + checked + '" onclick="togglePerm(\'' + p.id + '\', this)">' +
              '<input type="checkbox"' + checked + '>' +
              escapeHtml(p.action) +
            '</label>';
        });

        modulesHtml +=
          '<div class="perm-module">' +
            '<div class="perm-module-header">' +
              '<span class="perm-module-name">' + escapeHtml(mod) + '</span>' +
              '<span class="perm-module-toggle" onclick="toggleModule(\'' + escapeHtml(mod) + '\', event)">Toggle All</span>' +
            '</div>' +
            '<div class="perm-actions" data-module="' + escapeHtml(mod) + '">' + checksHtml + '</div>' +
          '</div>';
      });

      const canEdit = !role.is_system || (getUser() && getUser().role === 'super_admin');
      const canDelete = !role.is_system;

      editorHtml =
        '<div class="perm-editor">' +
          '<div class="perm-editor-header">' +
            '<h3>Permissions for: ' + escapeHtml(role.name) + '</h3>' +
            '<div style="display:flex;gap:0.5rem">' +
              (canEdit ? '<button class="btn btn-secondary" onclick="editRoleInfo(\'' + role.id + '\')">Edit Info</button>' : '') +
              (canDelete ? '<button class="btn btn-danger" onclick="deleteRole(\'' + role.id + '\')">Delete Role</button>' : '') +
            '</div>' +
          '</div>' +
          '<div class="perm-editor-body">' + modulesHtml + '</div>' +
          (canEdit ? '<div class="perm-editor-footer"><div></div><button class="btn btn-primary" onclick="savePermissions()">Save Permissions</button></div>' : '') +
        '</div>';
    }
  } else {
    editorHtml =
      '<div class="perm-editor">' +
        '<div class="perm-editor-body">' +
          '<div class="empty-state">' +
            '<h3>Select a Role</h3>' +
            '<p>Click on a role card above to view and edit its permissions</p>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  document.getElementById('page-body').innerHTML =
    '<div class="page-header">' +
      '<div class="page-header-left">' +
        '<h1>Roles & Permissions</h1>' +
        '<p>Manage roles and their access levels across modules</p>' +
      '</div>' +
      '<button class="btn btn-primary" onclick="openCreateRole()">+ Create Role</button>' +
    '</div>' +
    statsHtml +
    '<div class="roles-grid">' + cardsHtml + '</div>' +
    editorHtml;
}

async function selectRole(roleId) {
  if (selectedRoleId === roleId) {
    selectedRoleId = null;
    selectedRolePerms.clear();
    renderPage();
    return;
  }
  selectedRoleId = roleId;
  try {
    const roleDetail = await apiGet('/roles/' + roleId);
    selectedRolePerms = new Set((roleDetail.permissions || []).map(p => p.id));
  } catch (e) {
    selectedRolePerms.clear();
    toast(e.message, 'error');
  }
  renderPage();
}

function togglePerm(permId, label) {
  if (selectedRolePerms.has(permId)) {
    selectedRolePerms.delete(permId);
    label.classList.remove('checked');
  } else {
    selectedRolePerms.add(permId);
    label.classList.add('checked');
  }
}

function toggleModule(moduleName, event) {
  event.stopPropagation();
  const perms = groupedPermissions[moduleName] || [];
  const allChecked = perms.every(p => selectedRolePerms.has(p.id));

  perms.forEach(p => {
    if (allChecked) {
      selectedRolePerms.delete(p.id);
    } else {
      selectedRolePerms.add(p.id);
    }
  });

  // Re-render checkboxes for this module
  var container = document.querySelector('[data-module="' + moduleName + '"]');
  if (container) {
    container.querySelectorAll('.perm-check').forEach(label => {
      var input = label.querySelector('input');
      var permId = null;
      // Find the perm id by matching the action text
      var actionText = label.textContent.trim();
      perms.forEach(p => { if (p.action === actionText) permId = p.id; });
      if (permId) {
        if (selectedRolePerms.has(permId)) {
          label.classList.add('checked');
          if (input) input.checked = true;
        } else {
          label.classList.remove('checked');
          if (input) input.checked = false;
        }
      }
    });
  }
}

async function savePermissions() {
  if (!selectedRoleId) return;
  try {
    await api('/roles/' + selectedRoleId, {
      method: 'PUT',
      body: { permissionIds: Array.from(selectedRolePerms) }
    });
    toast('Permissions saved successfully', 'success');
    // Reload to update permission counts
    const roles = await apiGet('/roles');
    allRoles = roles || [];
    renderPage();
  } catch (e) {
    toast(e.message, 'error');
  }
}

function openCreateRole() {
  document.getElementById('editRoleId').value = '';
  document.getElementById('roleName').value = '';
  document.getElementById('roleSlug').value = '';
  document.getElementById('roleDesc').value = '';
  document.getElementById('roleModalTitle').textContent = 'Create Role';
  document.getElementById('roleModalSubmit').textContent = 'Create Role';
  openModal('roleModal');

  // Auto-generate slug from name
  document.getElementById('roleName').oninput = function() {
    document.getElementById('roleSlug').value =
      this.value.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/(^_|_$)/g, '');
  };
}

function editRoleInfo(roleId) {
  var role = allRoles.find(r => r.id === roleId);
  if (!role) return;
  document.getElementById('editRoleId').value = role.id;
  document.getElementById('roleName').value = role.name;
  document.getElementById('roleSlug').value = role.slug;
  document.getElementById('roleDesc').value = role.description || '';
  document.getElementById('roleModalTitle').textContent = 'Edit Role';
  document.getElementById('roleModalSubmit').textContent = 'Save Changes';
  openModal('roleModal');
}

async function submitRole() {
  var name = document.getElementById('roleName').value.trim();
  var slug = document.getElementById('roleSlug').value.trim();
  var description = document.getElementById('roleDesc').value.trim();
  var editId = document.getElementById('editRoleId').value;

  if (!name || !slug) { toast('Name and slug are required', 'error'); return; }

  try {
    if (editId) {
      await api('/roles/' + editId, { method: 'PUT', body: { name: name, description: description } });
      toast('Role updated', 'success');
    } else {
      var created = await apiPost('/roles', { name: name, slug: slug, description: description, permissionIds: [] });
      toast('Role created! Now assign permissions.', 'success');
      selectedRoleId = created.id;
      selectedRolePerms.clear();
    }
    closeModal('roleModal');
    var roles = await apiGet('/roles');
    allRoles = roles || [];
    renderPage();
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function deleteRole(roleId) {
  var role = allRoles.find(r => r.id === roleId);
  if (!role) return;
  if (!confirm('Delete role "' + role.name + '"? This cannot be undone.')) return;
  try {
    await apiDelete('/roles/' + roleId);
    toast('Role deleted', 'success');
    if (selectedRoleId === roleId) {
      selectedRoleId = null;
      selectedRolePerms.clear();
    }
    var roles = await apiGet('/roles');
    allRoles = roles || [];
    renderPage();
  } catch (e) {
    toast(e.message, 'error');
  }
}
</script>
</body>
</html>
