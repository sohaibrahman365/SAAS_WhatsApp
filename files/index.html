<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — GeniSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    body { font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; }

    .tenant-row td:first-child { font-weight: 600; }

    .loading-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: .9rem;
      gap: .75rem;
    }
    .loading-spinner::before {
      content: '';
      width: 20px; height: 20px;
      border: 2px solid var(--light-2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar" id="topbar"></header>

    <div class="page" id="page-body">
      <div class="loading-spinner">Loading dashboard...</div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script src="shared.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const API_BASE = 'https://saaswhatsapp.up.railway.app/api';

/* ── Auth helpers ── */
function getAuth() {
  try {
    const token = localStorage.getItem('gs_token');
    const user  = JSON.parse(localStorage.getItem('gs_user') || 'null');
    return { token, user };
  } catch (e) {
    return { token: null, user: null };
  }
}

function setAuth(token, user) {
  localStorage.setItem('gs_token', token);
  localStorage.setItem('gs_user', JSON.stringify(user));
}

function logout() {
  localStorage.removeItem('gs_token');
  localStorage.removeItem('gs_user');
  window.location.href = 'login.html';
}

function authHeaders() {
  const { token } = getAuth();
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`,
  };
}

/* ── Sidebar HTML ── */
function sidebarHTML(activePage) {
  const { user } = getAuth();
  const name  = user?.name  || 'User';
  const role  = user?.role  || 'admin';
  const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

  const roleLabel = {
    super_admin: 'Super Admin',
    admin: 'Admin',
    manager: 'Manager',
    analyst: 'Analyst',
  }[role] || role;

  const items = [
    { key: 'dashboard',     href: 'index.html',         icon: '&#9962;',  label: 'Dashboard',     section: 'Main' },
    { key: 'inventory',     href: 'inventory.html',     icon: '&#128230;', label: 'Inventory',     section: 'Main' },
    { key: 'campaigns',     href: 'campaigns.html',     icon: '&#128228;', label: 'Campaigns',     section: 'Main' },
    { key: 'engagement',    href: 'engagement.html',    icon: '&#128172;', label: 'Engagement',    section: 'Main' },
    { key: 'bi',            href: 'bi.html',            icon: '&#128202;', label: 'BI Analytics',  section: 'Analytics' },
    { key: 'conversations', href: 'conversations.html', icon: '&#128489;', label: 'Conversations', section: 'Analytics' },
    { key: 'reports',       href: 'reports.html',       icon: '&#128196;', label: 'Reports',       section: 'Analytics' },
    { key: 'settings',      href: 'settings.html',      icon: '&#9881;',  label: 'Settings',      section: 'System' },
  ];

  let navHTML = '';
  let lastSection = '';
  items.forEach(item => {
    if (item.section !== lastSection) {
      navHTML += `<div class="sidebar-section">${item.section}</div>`;
      lastSection = item.section;
    }
    const active = item.key === activePage ? ' active' : '';
    navHTML += `<a href="${item.href}" class="nav-item${active}"><span class="nav-icon">${item.icon}</span> ${item.label}</a>`;
  });

  return `
    <div class="sidebar-logo">
      <div class="logo-icon">G</div>
      <div>
        <div class="logo-text">GeniSearch</div>
        <div class="logo-sub">${roleLabel}</div>
      </div>
    </div>
    <nav class="sidebar-nav">${navHTML}</nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar avatar-sm">${initials}</div>
        <div class="user-info">
          <div class="user-name">${name}</div>
          <div class="user-role">${roleLabel}</div>
        </div>
      </div>
    </div>
  `;
}

/* ── Topbar HTML ── */
function topbarHTML(title) {
  const { user } = getAuth();
  const initials = (user?.name || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

  return `
    <div class="topbar-title">${title}</div>
    <div class="topbar-actions">
      <div class="topbar-search">
        <span>&#128269;</span>
        <input type="text" placeholder="Search...">
      </div>
      <button class="topbar-btn" title="Notifications">&#128276;</button>
      <div class="topbar-avatar" title="${user?.email || ''}" onclick="logout()" style="cursor:pointer">${initials}</div>
    </div>
  `;
}

/* ── Init page ── */
function initPage(title) {
  const { token } = getAuth();
  if (!token) {
    window.location.href = 'login.html';
    return false;
  }

  document.getElementById('sidebar').innerHTML = sidebarHTML('dashboard');
  document.getElementById('topbar').innerHTML  = topbarHTML(title);
  return true;
}

/* ── Plan badge colors ── */
const planColors = { Enterprise: 'purple', Pro: 'info', Business: 'success', Starter: 'warning', Free: 'neutral' };

/* ── Render dashboard ── */
function renderDashboard(data) {
  const page = document.getElementById('page-body');

  // Extract KPI values with safe defaults
  const totalTenants    = data.total_tenants    ?? data.totalTenants    ?? 0;
  const totalProducts   = data.total_products   ?? data.totalProducts   ?? 0;
  const totalCustomers  = data.total_customers  ?? data.totalCustomers  ?? 0;
  const totalCampaigns  = data.total_campaigns  ?? data.totalCampaigns  ?? 0;
  const messagesSent    = data.messages_sent    ?? data.messagesSent    ?? 0;
  const totalReplies    = data.total_replies    ?? data.totalReplies    ?? 0;

  // Campaign performance data
  const campaigns        = data.recent_campaigns  ?? data.recentCampaigns  ?? data.campaigns ?? [];
  const tenants          = data.tenants            ?? data.recent_tenants   ?? data.recentTenants ?? [];
  const sentimentData    = data.sentiment          ?? data.sentimentDistribution ?? null;

  page.innerHTML = `
    <!-- KPI Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon purple">&#127968;</div>
        <div class="stat-info">
          <div class="stat-label">Total Tenants</div>
          <div class="stat-value">${fmtNum(totalTenants)}</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">&#128230;</div>
        <div class="stat-info">
          <div class="stat-label">Total Products</div>
          <div class="stat-value">${fmtNum(totalProducts)}</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">&#128101;</div>
        <div class="stat-info">
          <div class="stat-label">Total Customers</div>
          <div class="stat-value">${fmtNum(totalCustomers)}</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">&#128228;</div>
        <div class="stat-info">
          <div class="stat-label">Total Campaigns</div>
          <div class="stat-value">${fmtNum(totalCampaigns)}</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">&#128172;</div>
        <div class="stat-info">
          <div class="stat-label">Messages Sent</div>
          <div class="stat-value">${fmtNum(messagesSent)}</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">&#128172;</div>
        <div class="stat-info">
          <div class="stat-label">Total Replies</div>
          <div class="stat-value">${fmtNum(totalReplies)}</div>
        </div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="grid-2 mb-3">
      <div class="card">
        <div class="card-header">
          <h3>&#128202; Campaign Performance</h3>
        </div>
        <div class="card-body">
          <div class="chart-wrap" style="height:260px">
            <canvas id="campaignChart"></canvas>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <h3>&#128200; Sentiment Distribution</h3>
        </div>
        <div class="card-body">
          <div class="chart-wrap" style="height:260px">
            <canvas id="sentimentChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Tenants Table -->
    <div class="card mb-3">
      <div class="card-header">
        <h3>&#127968; Tenants</h3>
        <a href="bi.html" class="btn btn-primary btn-sm">BI Drill-Down</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Plan</th>
              <th>Products</th>
              <th>Campaigns</th>
              <th>Customers</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tenantsTableBody">
            <tr><td colspan="6" class="text-center text-muted" style="padding:1.5rem;">No tenant data</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Recent Campaigns Table -->
    <div class="card">
      <div class="card-header">
        <h3>&#128228; Recent Campaigns</h3>
        <a href="campaigns.html" class="btn btn-secondary btn-sm">View All</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Campaign Name</th>
              <th>Tenant</th>
              <th>Status</th>
              <th>Sent</th>
              <th>Replies</th>
              <th>Conversions</th>
            </tr>
          </thead>
          <tbody id="campaignsTableBody">
            <tr><td colspan="6" class="text-center text-muted" style="padding:1.5rem;">No campaign data</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  `;

  // ── Render Tenants Table ──
  if (tenants.length > 0) {
    const tbody = document.getElementById('tenantsTableBody');
    tbody.innerHTML = '';
    tenants.forEach(t => {
      const name       = t.name       ?? t.tenant_name ?? t.business_name ?? '-';
      const plan       = t.plan       ?? t.subscription_plan ?? 'Free';
      const products   = t.products   ?? t.total_products ?? t.product_count ?? 0;
      const campCount  = t.campaigns  ?? t.total_campaigns ?? t.campaign_count ?? 0;
      const customers  = t.customers  ?? t.total_customers ?? t.customer_count ?? 0;
      const status     = t.status     ?? 'active';
      const planColor  = planColors[plan] || 'neutral';
      const statusBadge = status === 'active' ? 'success' : status === 'trial' ? 'warning' : 'neutral';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="fw-600">${name}</td>
        <td><span class="badge badge-${planColor}">${plan}</span></td>
        <td>${fmtNum(products)}</td>
        <td>${fmtNum(campCount)}</td>
        <td>${fmtNum(customers)}</td>
        <td><span class="badge badge-${statusBadge} badge-dot">${status}</span></td>
      `;
      tbody.appendChild(tr);
    });
  }

  // ── Render Campaigns Table ──
  if (campaigns.length > 0) {
    const tbody = document.getElementById('campaignsTableBody');
    tbody.innerHTML = '';
    campaigns.forEach(c => {
      const name        = c.name        ?? c.campaign_name ?? '-';
      const tenant      = c.tenant      ?? c.tenant_name ?? c.business_name ?? '-';
      const status      = c.status      ?? 'draft';
      const sent        = c.sent        ?? c.messages_sent ?? c.sent_count ?? 0;
      const replies     = c.replies     ?? c.reply_count ?? c.total_replies ?? 0;
      const conversions = c.conversions ?? c.conversion_count ?? 0;

      const statusMap = {
        active: 'success', completed: 'info', sent: 'success',
        draft: 'neutral', paused: 'warning', failed: 'danger',
        scheduled: 'warning',
      };
      const statusColor = statusMap[status] || 'neutral';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="fw-600">${name}</td>
        <td>${tenant}</td>
        <td><span class="badge badge-${statusColor} badge-dot">${status}</span></td>
        <td>${fmtNum(sent)}</td>
        <td>${fmtNum(replies)}</td>
        <td>${fmtNum(conversions)}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  // ── Campaign Performance Bar Chart ──
  const campCanvas = document.getElementById('campaignChart');
  if (campCanvas) {
    const recentCamps = campaigns.slice(0, 8);
    const labels = recentCamps.map(c => {
      const n = c.name ?? c.campaign_name ?? 'Campaign';
      return n.length > 15 ? n.substring(0, 15) + '...' : n;
    });
    const sentValues    = recentCamps.map(c => c.sent ?? c.messages_sent ?? c.sent_count ?? 0);
    const replyValues   = recentCamps.map(c => c.replies ?? c.reply_count ?? c.total_replies ?? 0);
    const convValues    = recentCamps.map(c => c.conversions ?? c.conversion_count ?? 0);

    new Chart(campCanvas.getContext('2d'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: 'Sent',
            data: sentValues,
            backgroundColor: GS.primary + 'cc',
            borderColor: GS.primary,
            borderWidth: 1,
            borderRadius: 4,
          },
          {
            label: 'Replies',
            data: replyValues,
            backgroundColor: GS.success + 'cc',
            borderColor: GS.success,
            borderWidth: 1,
            borderRadius: 4,
          },
          {
            label: 'Conversions',
            data: convValues,
            backgroundColor: GS.warning + 'cc',
            borderColor: GS.warning,
            borderWidth: 1,
            borderRadius: 4,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { position: 'top' } },
        scales: {
          x: { grid: { display: false } },
          y: { grid: { color: '#f0f0f0' }, ticks: { callback: v => fmtNum(v) } },
        },
      },
    });
  }

  // ── Sentiment Doughnut Chart ──
  const sentCanvas = document.getElementById('sentimentChart');
  if (sentCanvas) {
    const positive = sentimentData?.positive ?? sentimentData?.Positive ?? 0;
    const neutral  = sentimentData?.neutral  ?? sentimentData?.Neutral  ?? 0;
    const negative = sentimentData?.negative ?? sentimentData?.Negative ?? 0;
    const hasData  = positive + neutral + negative > 0;

    new Chart(sentCanvas.getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: ['Positive', 'Neutral', 'Negative'],
        datasets: [{
          data: hasData ? [positive, neutral, negative] : [1, 1, 1],
          backgroundColor: [GS.success + 'cc', GS.info + 'cc', GS.danger + 'cc'],
          borderColor: [GS.success, GS.info, GS.danger],
          borderWidth: 2,
          hoverOffset: 8,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '60%',
        plugins: {
          legend: { position: 'bottom' },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                if (!hasData) return 'No data yet';
                const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                const pct   = total > 0 ? ((ctx.raw / total) * 100).toFixed(1) : 0;
                return `${ctx.label}: ${ctx.raw} (${pct}%)`;
              }
            }
          }
        },
      },
    });
  }
}

/* ── Fetch dashboard data ── */
async function loadDashboard() {
  const { user } = getAuth();
  const role     = user?.role || 'admin';
  const tenantId = user?.tenant_id ?? user?.tenantId ?? user?.id;

  let url;
  if (role === 'super_admin') {
    url = `${API_BASE}/bi/saas-platform/dashboard`;
  } else {
    url = `${API_BASE}/bi/tenant/${tenantId}/dashboard`;
  }

  try {
    const res = await fetch(url, { headers: authHeaders() });

    if (res.status === 401 || res.status === 403) {
      logout();
      return;
    }

    if (!res.ok) {
      throw new Error(`Server error: ${res.status}`);
    }

    const data = await res.json();
    renderDashboard(data.data ?? data);

  } catch (err) {
    console.error('Dashboard load error:', err);
    const page = document.getElementById('page-body');
    page.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">&#9888;</div>
        <p>Unable to load dashboard data.</p>
        <p class="text-muted" style="font-size:.8rem;">${err.message}</p>
        <button class="btn btn-primary mt-2" onclick="loadDashboard()">Retry</button>
      </div>
    `;
  }
}

/* ── Boot ── */
document.addEventListener('DOMContentLoaded', () => {
  if (initPage('Dashboard')) {
    loadDashboard();
  }
});
</script>
</body>
</html>
