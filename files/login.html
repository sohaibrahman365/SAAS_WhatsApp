<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GeniSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2c1654 0%, #667eea 60%, #764ba2 100%);
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background decoration */
    .login-page::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: rgba(102, 126, 234, 0.15);
      top: -200px;
      right: -150px;
    }
    .login-page::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(118, 75, 162, 0.12);
      bottom: -150px;
      left: -100px;
    }

    .login-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .login-logo-icon {
      width: 56px;
      height: 56px;
      background: var(--gradient);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: .75rem;
      font-family: 'Inter', sans-serif;
    }

    .login-logo-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .login-logo-subtitle {
      font-size: .85rem;
      color: var(--text-secondary);
      margin-top: .25rem;
      text-align: center;
    }

    .login-form .form-group {
      margin-bottom: 1.25rem;
    }

    .login-form .form-label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: .45rem;
    }

    .login-form .form-control {
      padding: .7rem 1rem;
      font-size: .9rem;
      border-radius: var(--radius-sm);
    }

    .login-btn {
      width: 100%;
      padding: .75rem 1rem;
      background: var(--gradient);
      color: var(--white);
      border: none;
      border-radius: var(--radius-sm);
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--t);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }
    .login-btn:hover {
      opacity: .9;
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.5);
    }
    .login-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .login-error {
      display: none;
      background: var(--danger-light);
      color: var(--danger);
      padding: .65rem 1rem;
      border-radius: var(--radius-sm);
      font-size: .82rem;
      font-weight: 500;
      margin-bottom: 1.25rem;
      border: 1px solid rgba(231, 76, 60, 0.15);
    }
    .login-error.visible {
      display: block;
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .78rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">G</div>
      <div class="login-logo-title">GeniSearch</div>
      <div class="login-logo-subtitle">WhatsApp Campaign Intelligence Platform</div>
    </div>

    <form class="login-form" id="loginForm" autocomplete="on">
      <div class="login-error" id="loginError"></div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="you@company.com"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          class="form-control"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="login-btn" id="loginBtn">Log In</button>
    </form>

    <div class="login-footer">
      &copy; 2026 GeniSearch. All rights reserved.
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://saaswhatsapp.up.railway.app/api';

/* ── Auth helpers ── */
function getAuth() {
  try {
    const token = localStorage.getItem('gs_token');
    const user  = JSON.parse(localStorage.getItem('gs_user') || 'null');
    return { token, user };
  } catch (e) {
    return { token: null, user: null };
  }
}

function setAuth(token, user) {
  localStorage.setItem('gs_token', token);
  localStorage.setItem('gs_user', JSON.stringify(user));
}

/* ── Redirect if already logged in ── */
(function checkExistingAuth() {
  const { token } = getAuth();
  if (token) {
    window.location.href = 'index.html';
  }
})();

/* ── Login form handler ── */
const form     = document.getElementById('loginForm');
const errorEl  = document.getElementById('loginError');
const loginBtn = document.getElementById('loginBtn');

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.add('visible');
}

function hideError() {
  errorEl.classList.remove('visible');
}

form.addEventListener('submit', async function (e) {
  e.preventDefault();
  hideError();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showError('Please enter both email and password.');
    return;
  }

  loginBtn.disabled  = true;
  loginBtn.textContent = 'Logging in...';

  try {
    const res = await fetch(`${API_BASE}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || data.message || 'Invalid credentials. Please try again.');
    }

    // Save auth and redirect
    setAuth(data.token, data.user);
    window.location.href = 'index.html';

  } catch (err) {
    showError(err.message || 'Login failed. Please check your credentials.');
    loginBtn.disabled   = false;
    loginBtn.textContent = 'Log In';
  }
});
</script>
</body>
</html>
