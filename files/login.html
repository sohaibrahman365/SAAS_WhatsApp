<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GeniSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: none; }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2c1654 0%, #667eea 60%, #764ba2 100%);
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .login-page::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: rgba(102, 126, 234, 0.15);
      top: -200px; right: -150px;
    }
    .login-page::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(118, 75, 162, 0.12);
      bottom: -150px; left: -100px;
    }

    .lp-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lp-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .lp-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.75rem;
    }

    .lp-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1E1E2E;
      line-height: 1.3;
    }

    .lp-subtitle {
      font-size: 0.85rem;
      color: #6B7280;
      margin-top: 0.3rem;
      line-height: 1.5;
      text-align: center;
    }

    .lp-form .form-group { margin-bottom: 1.25rem; text-align: left; }

    .lp-form .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #1E1E2E;
      margin-bottom: 0.45rem;
    }

    .lp-form .form-control {
      width: 100%;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      border: 1px solid #E2E6EA;
      border-radius: 6px;
      outline: none;
      transition: 0.2s ease;
      font-family: inherit;
    }
    .lp-form .form-control:focus {
      border-color: #6C5CE7;
      box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
    }

    .lp-btn {
      width: 100%;
      padding: 0.75rem 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
      font-family: inherit;
    }
    .lp-btn:hover { opacity: 0.9; box-shadow: 0 4px 16px rgba(102, 126, 234, 0.5); }
    .lp-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .lp-error {
      display: none;
      background: #FDF0ED;
      color: #E17055;
      padding: 0.65rem 1rem;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 500;
      margin-bottom: 1.25rem;
      border: 1px solid rgba(225, 112, 85, 0.15);
    }
    .lp-error.visible { display: block; }

    .lp-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: #9CA3AF;
    }
  </style>
</head>
<body>

<div class="login-page">
  <div class="lp-card">
    <div class="lp-header">
      <div class="lp-icon">G</div>
      <div class="lp-title">GeniSearch</div>
      <div class="lp-subtitle">WhatsApp Campaign Intelligence Platform</div>
    </div>

    <form class="lp-form" id="loginForm" autocomplete="on">
      <div class="lp-error" id="loginError"></div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@company.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" required>
      </div>

      <button type="submit" class="lp-btn" id="loginBtn">Log In</button>
    </form>

    <div class="lp-footer">&copy; 2026 GeniSearch. All rights reserved.</div>
  </div>
</div>

<script>
const API_BASE = 'https://saaswhatsapp.up.railway.app/api';

function getAuth() {
  try {
    return { token: localStorage.getItem('gs_token'), user: JSON.parse(localStorage.getItem('gs_user') || 'null') };
  } catch (e) { return { token: null, user: null }; }
}

function setAuth(token, user) {
  localStorage.setItem('gs_token', token);
  localStorage.setItem('gs_user', JSON.stringify(user));
}

(function() {
  if (getAuth().token) window.location.href = 'index.html';
})();

var form     = document.getElementById('loginForm');
var errorEl  = document.getElementById('loginError');
var loginBtn = document.getElementById('loginBtn');

function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('visible'); }
function hideError() { errorEl.classList.remove('visible'); }

form.addEventListener('submit', async function(e) {
  e.preventDefault();
  hideError();

  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;

  if (!email || !password) { showError('Please enter both email and password.'); return; }

  loginBtn.disabled = true;
  loginBtn.textContent = 'Logging in...';

  try {
    var res = await fetch(API_BASE + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password }),
    });

    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Invalid credentials');

    setAuth(data.token, data.user);
    window.location.href = 'index.html';
  } catch (err) {
    showError(err.message || 'Login failed. Please check your credentials.');
    loginBtn.disabled = false;
    loginBtn.textContent = 'Log In';
  }
});
</script>
</body>
</html>
