<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp — GeniSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page" id="page-body"><div class="loading-spinner">Loading...</div></div>
  </div>
</div>

<div class="modal-overlay" id="sendModal">
  <div class="modal">
    <div class="modal-header"><h3>Send Test Message</h3><button class="modal-close" onclick="closeModal('sendModal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Phone Number (international, no +)</label><input id="sendTo" class="form-control" placeholder="923001234567"></div>
      <div class="form-group"><label>Message</label><textarea id="sendMsg" class="form-control" rows="3" placeholder="Hello! This is a test message."></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('sendModal')">Cancel</button><button class="btn btn-success" onclick="sendMessage()">Send</button></div>
  </div>
</div>

<div class="modal-overlay" id="analyzeModal">
  <div class="modal">
    <div class="modal-header"><h3>AI Text Analysis</h3><button class="modal-close" onclick="closeModal('analyzeModal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Text to Analyze</label><textarea id="analyzeText" class="form-control" rows="3" placeholder="Enter customer reply text..."></textarea></div>
      <div id="analyzeResult" style="display:none" class="mt-2"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('analyzeModal')">Close</button><button class="btn btn-primary" onclick="analyzeText()">Analyze</button></div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const user = requireLogin(); if (!user) return;
  document.getElementById('sidebar').innerHTML = sidebarHTML('conversations.html');
  document.getElementById('topbar').innerHTML = topbarHTML('WhatsApp');
  initPage('WhatsApp');
  loadPage();
});

async function loadPage() {
  const page = document.getElementById('page-body');
  try {
    const [waStatus, aiStatus, campaigns] = await Promise.all([
      apiGet('/whatsapp/status').catch(() => ({ configured: false, stub_mode: true })),
      apiGet('/ai/status').catch(() => ({ configured: false, stub_mode: true })),
      apiGet('/campaigns').catch(() => [])
    ]);

    const waBadge = waStatus.configured ? '<span class="badge badge-success badge-dot">Connected</span>' : '<span class="badge badge-warning badge-dot">Stub Mode</span>';
    const aiBadge = aiStatus.configured ? '<span class="badge badge-success badge-dot">Connected</span>' : '<span class="badge badge-warning badge-dot">Stub Mode</span>';

    let responsesHTML = '';
    const activeCamps = campaigns.filter(c => ['active','completed'].includes(c.status)).slice(0, 5);

    for (const camp of activeCamps) {
      try {
        const data = await apiGet('/bi/campaign/' + camp.id + '/dashboard');
        const resps = data.responses || [];
        if (resps.length === 0) continue;

        let respRows = '';
        resps.slice(0, 10).forEach(r => {
          respRows += '<tr><td>'+escapeHtml(r.customer_name||'-')+'</td><td>'+escapeHtml(r.customer_phone||'-')+'</td><td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escapeHtml(r.response_text||'')+'</td><td>'+sentimentBadge(r.sentiment)+'</td><td><span class="badge badge-info">'+(r.intent||'N/A')+'</span></td><td style="font-size:.8rem;color:var(--text-muted)">'+escapeHtml(r.suggested_reply||'-')+'</td></tr>';
        });

        responsesHTML += '<div class="card mb-3"><div class="card-header"><h3>'+escapeHtml(camp.name)+' '+statusBadge(camp.status)+'</h3><span class="text-muted">'+resps.length+' responses</span></div><div class="table-wrap"><table><thead><tr><th>Customer</th><th>Phone</th><th>Reply</th><th>Sentiment</th><th>Intent</th><th>Suggested Reply</th></tr></thead><tbody>'+respRows+'</tbody></table></div></div>';
      } catch (e) { continue; }
    }

    if (!responsesHTML) responsesHTML = '<div class="empty-state"><div class="empty-icon">&#128172;</div><h3>No responses yet</h3><p>Launch a campaign and wait for customer replies.</p></div>';

    page.innerHTML = `
      <div class="page-header">
        <div class="page-header-left"><h1>WhatsApp</h1><p>Messages & AI Analysis</p></div>
        <div class="page-header-actions">
          <button class="btn btn-primary" onclick="openModal('analyzeModal')">&#129302; AI Analyze</button>
          <button class="btn btn-success" onclick="openModal('sendModal')">&#128172; Send Test</button>
        </div>
      </div>

      <div class="stats-grid mb-3">
        <div class="stat-card">
          <div class="stat-info"><div class="stat-label">WhatsApp API</div><div class="stat-value" style="font-size:1rem">${waBadge}</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-info"><div class="stat-label">AI Analysis</div><div class="stat-value" style="font-size:1rem">${aiBadge}</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-info"><div class="stat-label">Active Campaigns</div><div class="stat-value">${activeCamps.length}</div></div>
        </div>
      </div>

      <h2 style="margin-bottom:16px">Campaign Responses</h2>
      ${responsesHTML}
    `;
  } catch (err) {
    page.innerHTML = '<div class="empty-state"><p>'+escapeHtml(err.message)+'</p><button class="btn btn-primary mt-2" onclick="loadPage()">Retry</button></div>';
  }
}

async function sendMessage() {
  const to = document.getElementById('sendTo').value.trim();
  const msg = document.getElementById('sendMsg').value.trim();
  if (!to || !msg) { toast('Phone and message required','error'); return; }
  try {
    const r = await apiPost('/whatsapp/send', { to, message: msg });
    toast('Sent! ID: '+(r.wa_message_id||'stub') + (r.stub ? ' (stub mode)' : ''), 'success');
    closeModal('sendModal');
  } catch(e) { toast(e.message, 'error'); }
}

async function analyzeText() {
  const text = document.getElementById('analyzeText').value.trim();
  if (!text) { toast('Enter text to analyze','error'); return; }
  const result = document.getElementById('analyzeResult');
  result.style.display = 'block';
  result.innerHTML = '<div class="loading-spinner">Analyzing...</div>';
  try {
    const r = await apiPost('/ai/analyze', { text });
    const a = r.analysis;
    result.innerHTML = `
      <div class="card">
        <div class="card-body">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div><strong>Sentiment:</strong> ${sentimentBadge(a.sentiment)}</div>
            <div><strong>Score:</strong> ${a.sentiment_score}</div>
            <div><strong>Intent:</strong> <span class="badge badge-info">${a.intent}</span></div>
            <div><strong>Confidence:</strong> ${fmtPct(a.confidence)}</div>
          </div>
          <div class="mt-2"><strong>Key Phrases:</strong> ${(a.key_phrases||[]).map(p => '<span class="badge badge-neutral" style="margin:2px">'+escapeHtml(p)+'</span>').join('')}</div>
          <div class="mt-2"><strong>Suggested Reply:</strong><br><em class="text-muted">${escapeHtml(a.suggested_reply||'-')}</em></div>
          ${r.stub ? '<div class="mt-2"><span class="badge badge-warning">Stub Mode</span></div>' : ''}
        </div>
      </div>`;
  } catch(e) { result.innerHTML = '<p class="text-danger">'+escapeHtml(e.message)+'</p>'; }
}
</script>
</body>
</html>
