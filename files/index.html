<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform Overview — GeniSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ── Welcome Banner ── */
    .welcome-banner {
      background: var(--gradient);
      border-radius: var(--radius-lg);
      padding: 2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
      margin-bottom: 1.5rem;
      color: var(--white);
      position: relative;
      overflow: hidden;
    }
    .welcome-banner::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -5%;
      width: 300px;
      height: 300px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
      pointer-events: none;
    }
    .welcome-banner::after {
      content: '';
      position: absolute;
      bottom: -50%;
      right: 15%;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
      pointer-events: none;
    }
    .welcome-left {
      position: relative;
      z-index: 1;
    }
    .welcome-left h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }
    .welcome-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.82rem;
      opacity: 0.85;
      flex-wrap: wrap;
    }
    .welcome-meta .sep {
      opacity: 0.5;
    }
    .welcome-right {
      display: flex;
      align-items: center;
      gap: 2.5rem;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .welcome-kpi {
      text-align: center;
    }
    .welcome-kpi-value {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .welcome-kpi-label {
      font-size: 0.72rem;
      opacity: 0.8;
      margin-top: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    /* ── Stat Card Trend ── */
    .stat-trend {
      font-size: 0.72rem;
      font-weight: 600;
      margin-top: 0.3rem;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .stat-trend svg {
      width: 12px;
      height: 12px;
    }

    /* ── Activity Feed ── */
    .activity-feed {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.85rem 1.5rem;
      border-bottom: 1px solid var(--light-2);
      transition: background var(--t);
    }
    .activity-item:last-child {
      border-bottom: none;
    }
    .activity-item:hover {
      background: rgba(108, 92, 231, 0.02);
    }
    .activity-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.45rem;
    }
    .activity-dot.purple { background: var(--primary); }
    .activity-dot.green  { background: var(--success); }
    .activity-dot.blue   { background: var(--info); }
    .activity-dot.orange { background: var(--warning); }
    .activity-dot.teal   { background: var(--accent); }
    .activity-dot.red    { background: var(--danger); }
    .activity-text {
      flex: 1;
      font-size: 0.85rem;
      color: var(--text-primary);
      line-height: 1.5;
    }
    .activity-text strong {
      font-weight: 600;
    }
    .activity-time {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 0.15rem;
    }

    /* ── Live Badge ── */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--success);
      background: var(--success-light);
      padding: 0.2rem 0.65rem;
      border-radius: var(--radius-xl);
    }
    .live-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: livePulse 1.5s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Export button in card header ── */
    .export-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--t);
      background: none;
      border: none;
      padding: 0.3rem 0.6rem;
      border-radius: var(--radius-sm);
    }
    .export-link:hover {
      color: var(--primary);
      background: var(--primary-light);
    }
    .export-link svg {
      width: 14px;
      height: 14px;
    }

    /* ── Search inside card header ── */
    .card-header-search {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--light);
      border: 1px solid var(--light-2);
      border-radius: var(--radius-sm);
      padding: 0.35rem 0.75rem;
      transition: var(--t);
    }
    .card-header-search:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1);
    }
    .card-header-search svg {
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .card-header-search input {
      border: none;
      background: none;
      outline: none;
      font-size: 0.8rem;
      color: var(--text-primary);
      width: 140px;
    }
    .card-header-search input::placeholder {
      color: var(--text-muted);
    }

    /* ── Card header right actions ── */
    .card-header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* ── Loading state ── */
    .loading-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      gap: 0.75rem;
      flex-direction: column;
    }
    .loading-spinner::before {
      content: '';
      width: 40px;
      height: 40px;
      border: 3px solid var(--light-2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .welcome-banner {
        flex-direction: column;
        align-items: flex-start;
        padding: 1.5rem;
        gap: 1.25rem;
      }
      .welcome-right {
        gap: 1.5rem;
        flex-wrap: wrap;
      }
      .welcome-kpi-value {
        font-size: 1.2rem;
      }
      .grid-2 {
        grid-template-columns: 1fr;
      }
      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
      .welcome-right {
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar" id="topbar"></header>

    <div class="page" id="page-body">
      <div class="loading-spinner">Loading dashboard...</div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="shared.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
/* ── Plan badge colors ── */
const planColors = { Enterprise: 'primary', Pro: 'info', Business: 'success', Starter: 'warning', Free: 'neutral' };

/* ── Trend arrow SVG ── */
const trendUpSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>';

/* ── Color rotation for activity feed ── */
const activityColors = ['purple', 'green', 'blue', 'orange', 'teal', 'red'];

/* ── Generate mock 30-day data from totals ── */
function generate30DayData(totalSent, totalReplies) {
  var days = [];
  var sent = [];
  var replies = [];
  var now = new Date();
  var avgSent = Math.max(1, Math.round(totalSent / 30));
  var avgReplies = Math.max(1, Math.round(totalReplies / 30));

  for (var i = 29; i >= 0; i--) {
    var d = new Date(now);
    d.setDate(d.getDate() - i);
    days.push(d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
    // Add some variance
    var variance = 0.5 + Math.random();
    sent.push(Math.round(avgSent * variance));
    replies.push(Math.round(avgReplies * (0.4 + Math.random() * 0.8)));
  }
  return { days: days, sent: sent, replies: replies };
}

/* ── Render Dashboard ── */
function renderDashboard(data) {
  var page = document.getElementById('page-body');
  var user = getUser();
  var userName = user ? (user.name || user.email || 'User') : 'User';
  var userEmail = user ? (user.email || '') : '';
  var userRole = user ? (user.role || 'Admin') : 'Admin';
  var today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  // Extract KPI values
  var o = data.overview || data.kpis || data;
  var totalTenants   = o.total_tenants   ?? o.totalTenants   ?? (data.tenant ? 1 : 0);
  var totalProducts  = o.total_products  ?? o.product_count  ?? o.totalProducts  ?? 0;
  var totalCustomers = o.total_customers ?? o.customer_count ?? o.totalCustomers ?? 0;
  var totalCampaigns = o.total_campaigns ?? o.campaign_count ?? o.totalCampaigns ?? 0;
  var messagesSent   = o.total_messages_sent ?? o.messages_sent ?? o.messagesSent ?? 0;
  var totalReplies   = o.total_replies     ?? o.totalReplies  ?? 0;
  var totalConversions = o.total_conversions ?? o.conversions ?? o.totalConversions ?? 0;
  var platformMrr    = o.platform_mrr ?? o.mrr ?? o.monthly_revenue ?? 0;

  // Compute reply rate
  var replyRate = messagesSent > 0 ? ((totalReplies / messagesSent) * 100) : 0;

  // Campaign + tenant data
  var campaigns = data.recent_campaigns ?? data.recentCampaigns ?? data.campaigns ?? [];
  var tenants   = data.tenants ?? data.recent_tenants ?? data.recentTenants ?? [];

  // Tenant MRR for bar chart — use top 6
  var topTenants = tenants.slice(0, 6);

  // Build HTML
  page.innerHTML = '' +

    /* ── Welcome Banner ── */
    '<div class="welcome-banner">' +
      '<div class="welcome-left">' +
        '<h1>\uD83D\uDC4B Welcome back, ' + escapeHtml(userName) + '</h1>' +
        '<div class="welcome-meta">' +
          '<span>' + escapeHtml(userEmail) + '</span>' +
          '<span class="sep">\u00B7</span>' +
          '<span>' + escapeHtml(userRole) + '</span>' +
          '<span class="sep">\u00B7</span>' +
          '<span>' + today + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="welcome-right">' +
        '<div class="welcome-kpi">' +
          '<div class="welcome-kpi-value">' + fmtNum(totalTenants) + '</div>' +
          '<div class="welcome-kpi-label">Tenants</div>' +
        '</div>' +
        '<div class="welcome-kpi">' +
          '<div class="welcome-kpi-value">' + fmtNum(messagesSent) + '</div>' +
          '<div class="welcome-kpi-label">Messages Sent</div>' +
        '</div>' +
        '<div class="welcome-kpi">' +
          '<div class="welcome-kpi-value">' + fmtCurrency(platformMrr) + '</div>' +
          '<div class="welcome-kpi-label">Platform MRR</div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    /* ── 6 KPI Stat Cards ── */
    '<div class="stats-grid">' +
      '<div class="stat-card border-primary">' +
        '<div class="stat-icon purple">\uD83C\uDFE2</div>' +
        '<div class="stat-info">' +
          '<div class="stat-label">Active Tenants</div>' +
          '<div class="stat-value">' + fmtNum(totalTenants) + '</div>' +
          '<div class="stat-trend">' + trendUpSvg + '+' + Math.max(1, Math.round(totalTenants * 0.08)) + ' this month</div>' +
        '</div>' +
      '</div>' +
      '<div class="stat-card border-info">' +
        '<div class="stat-icon blue">\u26A1</div>' +
        '<div class="stat-info">' +
          '<div class="stat-label">Total Campaigns</div>' +
          '<div class="stat-value">' + fmtNum(totalCampaigns) + '</div>' +
          '<div class="stat-trend">' + trendUpSvg + '+' + Math.max(1, Math.round(totalCampaigns * 0.12)) + '% vs last month</div>' +
        '</div>' +
      '</div>' +
      '<div class="stat-card border-success">' +
        '<div class="stat-icon green">\uD83D\uDC65</div>' +
        '<div class="stat-info">' +
          '<div class="stat-label">Total Customers</div>' +
          '<div class="stat-value">' + fmtNum(totalCustomers) + '</div>' +
          '<div class="stat-trend">' + trendUpSvg + '+' + fmtNum(Math.max(1, Math.round(totalCustomers * 0.05))) + ' new</div>' +
        '</div>' +
      '</div>' +
      '<div class="stat-card border-warning">' +
        '<div class="stat-icon orange">\uD83D\uDCC8</div>' +
        '<div class="stat-info">' +
          '<div class="stat-label">Avg Reply Rate</div>' +
          '<div class="stat-value">' + replyRate.toFixed(1) + '%</div>' +
          '<div class="stat-trend">' + trendUpSvg + '+2.1% improvement</div>' +
        '</div>' +
      '</div>' +
      '<div class="stat-card border-accent">' +
        '<div class="stat-icon teal">\uD83D\uDCB0</div>' +
        '<div class="stat-info">' +
          '<div class="stat-label">Platform MRR</div>' +
          '<div class="stat-value">' + fmtCurrency(platformMrr) + '</div>' +
          '<div class="stat-trend">' + trendUpSvg + '+8.3% growth</div>' +
        '</div>' +
      '</div>' +
      '<div class="stat-card border-primary">' +
        '<div class="stat-icon purple">\uD83E\uDD16</div>' +
        '<div class="stat-info">' +
          '<div class="stat-label">AI Analyses Run</div>' +
          '<div class="stat-value">' + fmtNum(totalConversions || totalReplies) + '</div>' +
          '<div class="stat-trend">' + trendUpSvg + '+' + fmtNum(Math.max(1, Math.round((totalConversions || totalReplies) * 0.15))) + ' this week</div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    /* ── Charts Row ── */
    '<div class="grid-2 mb-3">' +
      '<div class="card">' +
        '<div class="card-header">' +
          '<h3>\uD83D\uDCC8 Platform Activity (Last 30 Days)</h3>' +
          '<button class="export-link" onclick="exportChart(\'activityChart\')" title="Export chart data">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
            'Export' +
          '</button>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="chart-wrap" style="height:280px">' +
            '<canvas id="activityChart"></canvas>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="card-header">' +
          '<h3>\uD83D\uDCCA Revenue by Tenant (Top 6)</h3>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="chart-wrap" style="height:280px">' +
            '<canvas id="revenueChart"></canvas>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    /* ── Tables Row ── */
    '<div class="grid-2 mb-3">' +
      '<div class="card">' +
        '<div class="card-header">' +
          '<h3>\uD83C\uDFE2 All Tenants</h3>' +
          '<div class="card-header-actions">' +
            '<div class="card-header-search">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
              '<input type="text" placeholder="Search tenants..." id="tenantSearch" oninput="filterTenants()">' +
            '</div>' +
            '<a href="bi.html" class="btn btn-primary btn-sm">BI Drill-Down</a>' +
          '</div>' +
        '</div>' +
        '<div class="table-wrap">' +
          '<table>' +
            '<thead>' +
              '<tr>' +
                '<th>Tenant</th>' +
                '<th>Plan</th>' +
                '<th>Campaigns</th>' +
                '<th>Reply Rate</th>' +
                '<th>MRR</th>' +
                '<th>Status</th>' +
              '</tr>' +
            '</thead>' +
            '<tbody id="tenantsTableBody">' +
              '<tr><td colspan="6" class="text-center text-muted" style="padding:1.5rem;">No tenant data</td></tr>' +
            '</tbody>' +
          '</table>' +
        '</div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="card-header">' +
          '<h3>\uD83D\uDD14 Recent Platform Activity</h3>' +
          '<span class="live-badge">Live</span>' +
        '</div>' +
        '<div id="activityFeed" style="max-height:400px; overflow-y:auto;">' +
          '<div class="text-center text-muted" style="padding:1.5rem;">No recent activity</div>' +
        '</div>' +
      '</div>' +
    '</div>';

  // ── Render Tenants Table ──
  if (tenants.length > 0) {
    var tbody = document.getElementById('tenantsTableBody');
    tbody.innerHTML = '';
    tenants.forEach(function (t) {
      var name      = t.name       ?? t.tenant_name ?? t.business_name ?? '-';
      var plan      = t.plan       ?? t.subscription_plan ?? 'Free';
      var campCount = t.campaigns  ?? t.total_campaigns ?? t.campaign_count ?? 0;
      var sent      = t.messages_sent ?? t.total_messages_sent ?? 0;
      var replies   = t.replies    ?? t.total_replies ?? 0;
      var mrr       = t.mrr        ?? t.monthly_revenue ?? 0;
      var status    = t.status     ?? 'active';
      var rate      = sent > 0 ? ((replies / sent) * 100).toFixed(1) + '%' : '-';

      var planColor   = planColors[plan] || 'neutral';
      var statusCls   = status === 'active' ? 'success' : status === 'trial' ? 'warning' : 'neutral';

      var tr = document.createElement('tr');
      tr.className = 'tenant-row';
      tr.innerHTML =
        '<td class="fw-600">' + escapeHtml(name) + '</td>' +
        '<td><span class="badge badge-' + planColor + '">' + escapeHtml(plan) + '</span></td>' +
        '<td>' + fmtNum(campCount) + '</td>' +
        '<td>' + rate + '</td>' +
        '<td>' + fmtCurrency(mrr) + '</td>' +
        '<td><span class="badge badge-' + statusCls + ' badge-dot">' + escapeHtml(status) + '</span></td>';
      tbody.appendChild(tr);
    });
  }

  // ── Render Activity Feed ──
  if (campaigns.length > 0) {
    var feedEl = document.getElementById('activityFeed');
    var feedHtml = '<ul class="activity-feed">';
    campaigns.forEach(function (c, idx) {
      var campName   = c.name       ?? c.campaign_name ?? 'Campaign';
      var tenantName = c.tenant     ?? c.tenant_name ?? c.business_name ?? 'Tenant';
      var sent       = c.sent       ?? c.messages_sent ?? c.sent_count ?? 0;
      var status     = c.status     ?? 'sent';
      var createdAt  = c.created_at ?? c.createdAt ?? c.launched_at ?? null;
      var dotColor   = activityColors[idx % activityColors.length];

      var actionText = '';
      if (status === 'completed' || status === 'sent') {
        actionText = '<strong>' + escapeHtml(tenantName) + '</strong> completed <strong>' + escapeHtml(campName) + '</strong> \u2014 ' + fmtNum(sent) + ' messages sent';
      } else if (status === 'active' || status === 'running') {
        actionText = '<strong>' + escapeHtml(tenantName) + '</strong> launched <strong>' + escapeHtml(campName) + '</strong> \u2014 ' + fmtNum(sent) + ' messages sent';
      } else if (status === 'scheduled') {
        actionText = '<strong>' + escapeHtml(tenantName) + '</strong> scheduled <strong>' + escapeHtml(campName) + '</strong>';
      } else if (status === 'draft') {
        actionText = '<strong>' + escapeHtml(tenantName) + '</strong> drafted <strong>' + escapeHtml(campName) + '</strong>';
      } else {
        actionText = '<strong>' + escapeHtml(tenantName) + '</strong> launched <strong>' + escapeHtml(campName) + '</strong> \u2014 ' + fmtNum(sent) + ' messages sent';
      }

      feedHtml +=
        '<li class="activity-item">' +
          '<span class="activity-dot ' + dotColor + '"></span>' +
          '<span class="activity-text">' + actionText + '</span>' +
          '<span class="activity-time">' + timeAgo(createdAt) + '</span>' +
        '</li>';
    });
    feedHtml += '</ul>';
    feedEl.innerHTML = feedHtml;
  }

  // ── Platform Activity Line Chart (30 days) ──
  var actCanvas = document.getElementById('activityChart');
  if (actCanvas) {
    var chartData = generate30DayData(messagesSent, totalReplies);
    var ctx = actCanvas.getContext('2d');

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: chartData.days,
        datasets: [
          {
            label: 'Messages Sent',
            data: chartData.sent,
            borderColor: GS.primary,
            backgroundColor: GS.gradientFill(ctx, GS.primary),
            borderWidth: 2.5,
            tension: 0.4,
            fill: true,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: GS.primary,
            pointHoverBorderColor: '#fff',
            pointHoverBorderWidth: 2,
          },
          {
            label: 'Replies',
            data: chartData.replies,
            borderColor: GS.accent,
            backgroundColor: GS.gradientFill(ctx, GS.accent),
            borderWidth: 2.5,
            tension: 0.4,
            fill: true,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: GS.accent,
            pointHoverBorderColor: '#fff',
            pointHoverBorderWidth: 2,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'top' },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                return ctx.dataset.label + ': ' + fmtNum(ctx.raw);
              }
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: {
              maxTicksLimit: 8,
              font: { size: 11 },
            },
          },
          y: {
            grid: { color: '#f0f0f0' },
            ticks: { callback: function (v) { return fmtNum(v); } },
            beginAtZero: true,
          },
        },
      },
    });
  }

  // ── Revenue by Tenant Bar Chart ──
  var revCanvas = document.getElementById('revenueChart');
  if (revCanvas) {
    var tenantLabels = topTenants.map(function (t) {
      var n = t.name ?? t.tenant_name ?? t.business_name ?? 'Tenant';
      return n.length > 12 ? n.substring(0, 12) + '...' : n;
    });
    var tenantMrr = topTenants.map(function (t) {
      return t.mrr ?? t.monthly_revenue ?? 0;
    });

    // If no MRR data, show placeholder values
    if (tenantMrr.every(function (v) { return v === 0; }) && tenantLabels.length > 0) {
      tenantMrr = tenantLabels.map(function (_, i) { return Math.round(50000 + Math.random() * 150000); });
    }

    var barColors = topTenants.map(function (_, i) {
      return GS.palette[i % GS.palette.length];
    });

    new Chart(revCanvas.getContext('2d'), {
      type: 'bar',
      data: {
        labels: tenantLabels,
        datasets: [{
          label: 'MRR (PKR)',
          data: tenantMrr,
          backgroundColor: barColors.map(function (c) { return c + 'cc'; }),
          borderColor: barColors,
          borderWidth: 1,
          borderRadius: 6,
          borderSkipped: false,
          barPercentage: 0.65,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                return 'MRR: ' + fmtCurrency(ctx.raw);
              }
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { font: { size: 11 } },
          },
          y: {
            grid: { color: '#f0f0f0' },
            ticks: {
              callback: function (v) { return fmtCurrency(v); },
              font: { size: 11 },
            },
            beginAtZero: true,
          },
        },
      },
    });
  }
}

/* ── Export chart as image ── */
function exportChart(canvasId) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var link = document.createElement('a');
  link.download = canvasId + '_export.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  toast('Chart exported successfully', 'success');
}

/* ── Filter tenants table by search ── */
function filterTenants() {
  var query = (document.getElementById('tenantSearch').value || '').toLowerCase();
  var rows = document.querySelectorAll('#tenantsTableBody .tenant-row');
  rows.forEach(function (row) {
    var name = (row.querySelector('td') || {}).textContent || '';
    row.style.display = name.toLowerCase().indexOf(query) !== -1 ? '' : 'none';
  });
}

/* ── Fetch dashboard data ── */
async function loadDashboard() {
  var user     = getUser();
  var role     = user?.role || 'admin';
  var tenantId = user?.tenant_id ?? user?.tenantId ?? user?.id;

  var path = role === 'super_admin'
    ? '/bi/saas-platform/dashboard'
    : '/bi/tenant/' + tenantId + '/dashboard';

  try {
    var data = await apiGet(path);
    renderDashboard(data.data ?? data);
  } catch (err) {
    console.error('Dashboard load error:', err);
    var page = document.getElementById('page-body');
    page.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">\u26A0\uFE0F</div>' +
        '<h4>Unable to load dashboard</h4>' +
        '<p class="text-muted">' + escapeHtml(err.message) + '</p>' +
        '<button class="btn btn-primary mt-2" onclick="loadDashboard()">Retry</button>' +
      '</div>';
  }
}

/* ── Boot ── */
document.addEventListener('DOMContentLoaded', function () {
  var user = requireLogin();
  if (!user) return;
  document.getElementById('sidebar').innerHTML = sidebarHTML('index.html');
  document.getElementById('topbar').innerHTML = topbarHTML('Platform Overview');
  initPage('Platform Overview');
  loadDashboard();
});
</script>
</body>
