<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BI Analytics — GeniSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .breadcrumb-nav { display:flex; align-items:center; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    .breadcrumb-nav a { color:var(--primary); font-weight:600; cursor:pointer; }
    .breadcrumb-nav .sep { color:var(--light-3); }
    .breadcrumb-nav .current { color:var(--text-primary); font-weight:700; }
    .funnel-bar { height:36px; border-radius:6px; display:flex; align-items:center; padding:0 12px; color:#fff; font-weight:600; font-size:.82rem; min-width:40px; transition:width .5s ease; }
    .funnel-step { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .funnel-label { min-width:90px; font-size:.82rem; font-weight:500; color:var(--text-secondary); }
    .clickable-row { cursor:pointer; } .clickable-row:hover { background:var(--primary-light) !important; }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page" id="page-body"><div class="loading-spinner">Loading BI analytics...</div></div>
  </div>
</div>
<div class="toast-container" id="toast-container"></div>
<script src="shared.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let currentLevel = 1;
const history = [];

document.addEventListener('DOMContentLoaded', () => {
  const user = requireLogin(); if (!user) return;
  document.getElementById('sidebar').innerHTML = sidebarHTML('bi.html');
  document.getElementById('topbar').innerHTML = topbarHTML('BI Analytics');
  initPage('BI Analytics');

  // Check URL params for deep linking
  const params = new URLSearchParams(location.search);
  if (params.get('campaign')) { loadLevel4(params.get('campaign')); }
  else if (params.get('product')) { loadLevel3(params.get('product')); }
  else if (params.get('tenant')) { loadLevel2(params.get('tenant')); }
  else { loadLevel1(); }
});

function breadcrumb(items) {
  return '<div class="breadcrumb-nav">' + items.map((it,i) => {
    if (i < items.length - 1) return '<a onclick="'+it.action+'">'+escapeHtml(it.label)+'</a><span class="sep">/</span>';
    return '<span class="current">'+escapeHtml(it.label)+'</span>';
  }).join('') + '</div>';
}

/* ── LEVEL 1: Platform ── */
async function loadLevel1() {
  currentLevel = 1; history.length = 0;
  const page = document.getElementById('page-body');
  page.innerHTML = '<div class="loading-spinner">Loading platform data...</div>';
  try {
    const data = await apiGet('/bi/saas-platform/dashboard');
    const o = data.overview || {};
    const tenants = data.tenants || [];
    const sentiment = data.sentiment_breakdown || [];

    const sentMap = {}; sentiment.forEach(s => sentMap[s.sentiment] = parseInt(s.count));

    let tRows = '';
    tenants.forEach(t => {
      tRows += '<tr class="clickable-row" onclick="loadLevel2(\''+t.id+'\')"><td class="fw-600">'+escapeHtml(t.name)+'</td><td><span class="badge badge-primary">'+escapeHtml(t.plan)+'</span></td><td>'+fmtNum(t.product_count)+'</td><td>'+fmtNum(t.campaign_count)+'</td><td>'+fmtNum(t.customer_count)+'</td><td>'+statusBadge(t.status)+'</td></tr>';
    });

    page.innerHTML = `
      ${breadcrumb([{label:'Platform'}])}
      <div class="stats-grid mb-3">
        <div class="stat-card border-primary"><div class="stat-info"><div class="stat-label">Tenants</div><div class="stat-value">${fmtNum(o.total_tenants)}</div></div></div>
        <div class="stat-card border-accent"><div class="stat-info"><div class="stat-label">Products</div><div class="stat-value">${fmtNum(o.total_products)}</div></div></div>
        <div class="stat-card border-success"><div class="stat-info"><div class="stat-label">Customers</div><div class="stat-value">${fmtNum(o.total_customers)}</div></div></div>
        <div class="stat-card"><div class="stat-info"><div class="stat-label">Campaigns</div><div class="stat-value">${fmtNum(o.total_campaigns)}</div></div></div>
        <div class="stat-card"><div class="stat-info"><div class="stat-label">Messages Sent</div><div class="stat-value">${fmtNum(o.total_messages_sent)}</div></div></div>
        <div class="stat-card"><div class="stat-info"><div class="stat-label">MRR</div><div class="stat-value">${fmtCurrency(o.total_mrr)}</div></div></div>
      </div>
      <div class="grid-2 mb-3">
        <div class="card"><div class="card-header"><h3>Sentiment</h3></div><div class="card-body"><div style="height:220px"><canvas id="sentChart"></canvas></div></div></div>
        <div class="card"><div class="card-header"><h3>Tenants by Plan</h3></div><div class="card-body"><div style="height:220px"><canvas id="planChart"></canvas></div></div></div>
      </div>
      <div class="card"><div class="card-header"><h3>Tenants</h3><span class="text-muted">Click a row to drill down</span></div><div class="table-wrap"><table><thead><tr><th>Name</th><th>Plan</th><th>Products</th><th>Campaigns</th><th>Customers</th><th>Status</th></tr></thead><tbody>${tRows || '<tr><td colspan="6" class="text-center text-muted">No tenants</td></tr>'}</tbody></table></div></div>
    `;

    // Charts
    new Chart(document.getElementById('sentChart'), { type:'doughnut', data:{ labels:['Positive','Neutral','Negative'], datasets:[{ data:[sentMap.positive||0, sentMap.neutral||0, sentMap.negative||0], backgroundColor:['#00B894','#74B9FF','#E17055'] }] }, options:{ responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{ legend:{ position:'bottom' } } } });

    const planCounts = {}; tenants.forEach(t => { planCounts[t.plan] = (planCounts[t.plan]||0)+1; });
    new Chart(document.getElementById('planChart'), { type:'bar', data:{ labels:Object.keys(planCounts), datasets:[{ label:'Tenants', data:Object.values(planCounts), backgroundColor:'#6C5CE7cc', borderRadius:6 }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, ticks:{ stepSize:1 } } } } });
  } catch(e) { page.innerHTML = '<div class="empty-state"><p>'+escapeHtml(e.message)+'</p><button class="btn btn-primary mt-2" onclick="loadLevel1()">Retry</button></div>'; }
}

/* ── LEVEL 2: Tenant ── */
async function loadLevel2(tenantId) {
  currentLevel = 2;
  const page = document.getElementById('page-body');
  page.innerHTML = '<div class="loading-spinner">Loading tenant...</div>';
  try {
    const data = await apiGet('/bi/tenant/'+tenantId+'/dashboard');
    const t = data.tenant || {};
    const k = data.kpis || {};
    const products = data.products || [];
    const campaigns = data.recent_campaigns || [];
    const topCust = data.top_customers || [];

    let pRows = ''; products.forEach(p => { pRows += '<tr class="clickable-row" onclick="loadLevel3(\''+p.id+'\')"><td class="fw-600">'+escapeHtml(p.name)+'</td><td>'+(p.price?fmtCurrency(p.price):'-')+'</td><td>'+fmtNum(p.customer_count)+'</td><td>'+statusBadge(p.status||'active')+'</td><td>'+fmtDate(p.created_at)+'</td></tr>'; });

    let cRows = ''; campaigns.forEach(c => { cRows += '<tr class="clickable-row" onclick="loadLevel4(\''+c.id+'\')"><td class="fw-600">'+escapeHtml(c.name)+'</td><td>'+statusBadge(c.status)+'</td><td>'+fmtNum(c.sent_count)+'</td><td>'+fmtNum(c.reply_count)+'</td></tr>'; });

    page.innerHTML = `
      ${breadcrumb([{label:'Platform',action:'loadLevel1()'},{label:t.name||'Tenant'}])}
      <div class="stats-grid mb-3">
        <div class="stat-card"><div class="stat-info"><div class="stat-label">Products</div><div class="stat-value">${fmtNum(k.product_count)}</div></div></div>
        <div class="stat-card"><div class="stat-info"><div class="stat-label">Customers</div><div class="stat-value">${fmtNum(k.customer_count)}</div></div></div>
        <div class="stat-card"><div class="stat-info"><div class="stat-label">Campaigns</div><div class="stat-value">${fmtNum(k.campaign_count)}</div></div></div>
        <div class="stat-card"><div class="stat-info"><div class="stat-label">Sent</div><div class="stat-value">${fmtNum(k.messages_sent)}</div></div></div>
        <div class="stat-card"><div class="stat-info"><div class="stat-label">Replies</div><div class="stat-value">${fmtNum(k.total_replies)}</div></div></div>
        <div class="stat-card"><div class="stat-info"><div class="stat-label">Conversions</div><div class="stat-value">${fmtNum(k.total_conversions)}</div></div></div>
      </div>
      <div class="grid-2 mb-3">
        <div class="card"><div class="card-header"><h3>Products</h3></div><div class="table-wrap"><table><thead><tr><th>Name</th><th>Price</th><th>Customers</th><th>Status</th><th>Created</th></tr></thead><tbody>${pRows||'<tr><td colspan="5" class="text-center text-muted">No products</td></tr>'}</tbody></table></div></div>
        <div class="card"><div class="card-header"><h3>Campaigns</h3></div><div class="table-wrap"><table><thead><tr><th>Name</th><th>Status</th><th>Sent</th><th>Replies</th></tr></thead><tbody>${cRows||'<tr><td colspan="4" class="text-center text-muted">No campaigns</td></tr>'}</tbody></table></div></div>
      </div>
      ${topCust.length ? '<div class="card"><div class="card-header"><h3>Top Customers</h3></div><div class="table-wrap"><table><thead><tr><th>Name</th><th>Phone</th><th>Priority</th><th>Reply Rate</th></tr></thead><tbody>'+topCust.map(c=>'<tr><td>'+escapeHtml(c.name||'-')+'</td><td>'+escapeHtml(c.phone)+'</td><td><strong>'+(c.priority_score||'-')+'</strong></td><td>'+fmtPct(c.reply_rate||0)+'</td></tr>').join('')+'</tbody></table></div></div>' : ''}
    `;
  } catch(e) { page.innerHTML = '<div class="empty-state"><p>'+escapeHtml(e.message)+'</p><button class="btn btn-primary mt-2" onclick="loadLevel1()">Back</button></div>'; }
}

/* ── LEVEL 3: Product ── */
async function loadLevel3(productId) {
  currentLevel = 3;
  const page = document.getElementById('page-body');
  page.innerHTML = '<div class="loading-spinner">Loading product...</div>';
  try {
    const data = await apiGet('/bi/product/'+productId+'/dashboard');
    const pr = data.product || {};
    const campaigns = data.campaigns || [];
    const sentiment = data.sentiment_breakdown || [];

    let cRows = ''; campaigns.forEach(c => { cRows += '<tr class="clickable-row" onclick="loadLevel4(\''+c.id+'\')"><td class="fw-600">'+escapeHtml(c.name)+'</td><td>'+statusBadge(c.status)+'</td><td>'+fmtNum(c.sent_count)+'</td><td>'+fmtNum(c.reply_count)+'</td><td>'+fmtNum(c.conversion_count)+'</td></tr>'; });

    const sentMap = {}; sentiment.forEach(s => sentMap[s.sentiment] = parseInt(s.count));

    page.innerHTML = `
      ${breadcrumb([{label:'Platform',action:'loadLevel1()'},{label:'Tenant',action:'loadLevel2("'+pr.tenant_id+'")'},{label:pr.name||'Product'}])}
      <div class="card mb-3"><div class="card-body"><h3>${escapeHtml(pr.name)}</h3><p class="text-muted">${escapeHtml(pr.description||'No description')} | ${pr.price?fmtCurrency(pr.price):'-'} | ${escapeHtml(pr.region||'-')}, ${escapeHtml(pr.city||'-')}</p></div></div>
      <div class="grid-2 mb-3">
        <div class="card"><div class="card-header"><h3>Sentiment</h3></div><div class="card-body"><div style="height:200px"><canvas id="pSent"></canvas></div></div></div>
        <div class="card"><div class="card-header"><h3>Campaigns (${campaigns.length})</h3></div><div class="table-wrap"><table><thead><tr><th>Name</th><th>Status</th><th>Sent</th><th>Replies</th><th>Conv.</th></tr></thead><tbody>${cRows||'<tr><td colspan="5" class="text-center text-muted">None</td></tr>'}</tbody></table></div></div>
      </div>
    `;
    new Chart(document.getElementById('pSent'), { type:'doughnut', data:{ labels:['Positive','Neutral','Negative'], datasets:[{ data:[sentMap.positive||0,sentMap.neutral||0,sentMap.negative||0], backgroundColor:['#00B894','#74B9FF','#E17055'] }] }, options:{ responsive:true, maintainAspectRatio:false, cutout:'60%' } });
  } catch(e) { page.innerHTML = '<div class="empty-state"><p>'+escapeHtml(e.message)+'</p></div>'; }
}

/* ── LEVEL 4: Campaign ── */
async function loadLevel4(campaignId) {
  currentLevel = 4;
  const page = document.getElementById('page-body');
  page.innerHTML = '<div class="loading-spinner">Loading campaign...</div>';
  try {
    const data = await apiGet('/bi/campaign/'+campaignId+'/dashboard');
    const c = data.campaign || {};
    const f = data.funnel || {};
    const sentiment = data.sentiment_breakdown || [];
    const intent = data.intent_breakdown || [];
    const recipients = data.recipients || [];
    const responses = data.responses || [];

    const total = parseInt(f.total_recipients)||1;
    const funnelData = [
      {label:'Sent',val:parseInt(f.sent)||0,color:'#6C5CE7'},
      {label:'Delivered',val:parseInt(f.delivered)||0,color:'#74B9FF'},
      {label:'Read',val:parseInt(f.read)||0,color:'#00CEC9'},
      {label:'Replied',val:parseInt(f.replied)||0,color:'#00B894'},
      {label:'Converted',val:parseInt(f.converted)||0,color:'#FDCB6E'}
    ];
    const funnelHTML = funnelData.map(s => '<div class="funnel-step"><span class="funnel-label">'+s.label+'</span><div class="funnel-bar" style="width:'+Math.max((s.val/total)*100,5)+'%;background:'+s.color+'">'+s.val+'</div></div>').join('');

    let rRows = ''; responses.slice(0,20).forEach(r => {
      rRows += '<tr class="clickable-row" onclick="loadLevel5(\''+r.id+'\')"><td>'+escapeHtml(r.customer_name||'-')+'</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escapeHtml(r.response_text||'')+'</td><td>'+sentimentBadge(r.sentiment)+'</td><td><span class="badge badge-info">'+(r.intent||'-')+'</span></td><td>'+fmtDate(r.received_at)+'</td></tr>';
    });

    page.innerHTML = `
      ${breadcrumb([{label:'Platform',action:'loadLevel1()'},{label:'Tenant',action:'loadLevel2("'+c.tenant_id+'")'},{label:c.product_name||'Product',action:'loadLevel3("'+(c.product_id||'')+'")'},{label:c.name||'Campaign'}])}
      <div class="card mb-3"><div class="card-body"><h3>${escapeHtml(c.name)} ${statusBadge(c.status)}</h3><p class="text-muted">${escapeHtml(c.description||'')} | Segment: ${c.target_segment||'all'} | Created: ${fmtDate(c.created_at)}</p></div></div>
      <div class="card mb-3"><div class="card-header"><h3>Delivery Funnel</h3></div><div class="card-body">${funnelHTML}</div></div>
      <div class="grid-2 mb-3">
        <div class="card"><div class="card-header"><h3>Sentiment</h3></div><div class="card-body"><div style="height:200px"><canvas id="cSent"></canvas></div></div></div>
        <div class="card"><div class="card-header"><h3>Intent</h3></div><div class="card-body"><div style="height:200px"><canvas id="cIntent"></canvas></div></div></div>
      </div>
      <div class="card"><div class="card-header"><h3>Responses (${responses.length})</h3><span class="text-muted">Click to see detail</span></div><div class="table-wrap"><table><thead><tr><th>Customer</th><th>Reply</th><th>Sentiment</th><th>Intent</th><th>Date</th></tr></thead><tbody>${rRows||'<tr><td colspan="5" class="text-center text-muted">No responses</td></tr>'}</tbody></table></div></div>
    `;

    const sentMap = {}; sentiment.forEach(s => sentMap[s.sentiment]=parseInt(s.count));
    new Chart(document.getElementById('cSent'), { type:'doughnut', data:{ labels:['Positive','Neutral','Negative'], datasets:[{ data:[sentMap.positive||0,sentMap.neutral||0,sentMap.negative||0], backgroundColor:['#00B894','#74B9FF','#E17055'] }] }, options:{ responsive:true, maintainAspectRatio:false, cutout:'60%' } });

    const intLabels = intent.map(i=>i.intent); const intVals = intent.map(i=>parseInt(i.count));
    new Chart(document.getElementById('cIntent'), { type:'bar', data:{ labels:intLabels, datasets:[{ label:'Count', data:intVals, backgroundColor:'#6C5CE7cc', borderRadius:6 }] }, options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y', plugins:{ legend:{ display:false } } } });
  } catch(e) { page.innerHTML = '<div class="empty-state"><p>'+escapeHtml(e.message)+'</p></div>'; }
}

/* ── LEVEL 5: Response ── */
async function loadLevel5(responseId) {
  currentLevel = 5;
  const page = document.getElementById('page-body');
  page.innerHTML = '<div class="loading-spinner">Loading response...</div>';
  try {
    const r = await apiGet('/bi/response/'+responseId);
    page.innerHTML = `
      ${breadcrumb([{label:'Platform',action:'loadLevel1()'},{label:'Campaign',action:'loadLevel4("'+r.campaign_id+'")'},{label:'Response Detail'}])}
      <div class="grid-2 mb-3">
        <div class="card"><div class="card-header"><h3>Response</h3></div><div class="card-body">
          <p style="font-size:1.1rem;line-height:1.6;padding:12px;background:var(--light);border-radius:8px">"${escapeHtml(r.response_text||'')}"</p>
          <div class="stats-grid mt-2">
            <div class="stat-card"><div class="stat-info"><div class="stat-label">Sentiment</div><div class="stat-value" style="font-size:1rem">${sentimentBadge(r.sentiment)}</div></div></div>
            <div class="stat-card"><div class="stat-info"><div class="stat-label">Score</div><div class="stat-value">${r.sentiment_score||'-'}</div></div></div>
            <div class="stat-card"><div class="stat-info"><div class="stat-label">Intent</div><div class="stat-value" style="font-size:1rem"><span class="badge badge-info">${r.intent||'-'}</span></div></div></div>
            <div class="stat-card"><div class="stat-info"><div class="stat-label">Confidence</div><div class="stat-value">${r.ai_confidence?fmtPct(r.ai_confidence):'-'}</div></div></div>
          </div>
          ${r.key_phrases ? '<div class="mt-2"><strong>Key Phrases:</strong> '+(r.key_phrases||[]).map(p=>'<span class="badge badge-neutral" style="margin:2px">'+escapeHtml(p)+'</span>').join('')+'</div>' : ''}
          ${r.suggested_reply ? '<div class="mt-2"><strong>Suggested Reply:</strong><br><em class="text-muted">'+escapeHtml(r.suggested_reply)+'</em></div>' : ''}
        </div></div>
        <div class="card"><div class="card-header"><h3>Customer</h3></div><div class="card-body">
          <p><strong>Name:</strong> ${escapeHtml(r.customer_name||'-')}</p>
          <p><strong>Phone:</strong> ${escapeHtml(r.customer_phone||'-')}</p>
          <p><strong>Email:</strong> ${escapeHtml(r.customer_email||'-')}</p>
          <p><strong>Location:</strong> ${escapeHtml(r.city||'-')}, ${escapeHtml(r.region||'-')}, ${escapeHtml(r.country||'-')}</p>
          <hr style="margin:12px 0;border-color:var(--light-2)">
          <p><strong>Priority Score:</strong> ${r.priority_score||'-'}/100</p>
          <p><strong>Reply Rate:</strong> ${r.reply_rate?fmtPct(r.reply_rate):'-'}</p>
          <p><strong>Campaigns Targeted:</strong> ${r.total_campaigns_targeted||'-'}</p>
          <p><strong>Campaign:</strong> ${escapeHtml(r.campaign_name||'-')}</p>
          <p><strong>Product:</strong> ${escapeHtml(r.product_name||'-')}</p>
        </div></div>
      </div>
    `;
  } catch(e) { page.innerHTML = '<div class="empty-state"><p>'+escapeHtml(e.message)+'</p></div>'; }
}
</script>
</body>
</html>
