<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers — GeniSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page" id="page-body"><div class="loading-spinner">Loading customers...</div></div>
  </div>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header"><h3>Add Customer</h3><button class="modal-close" onclick="closeModal('addModal')">&times;</button></div>
    <div class="modal-body">
      <form id="custForm">
        <div id="tWrap" style="display:none" class="form-group"><label>Tenant</label><select id="cTenant" class="form-control"><option value="">Select...</option></select></div>
        <div class="form-group"><label>Phone * (international)</label><input id="cPhone" class="form-control" required placeholder="923001234567"></div>
        <div class="form-row">
          <div class="form-group"><label>Name</label><input id="cName" class="form-control" placeholder="John Doe"></div>
          <div class="form-group"><label>Email</label><input id="cEmail" class="form-control" type="email" placeholder="john@example.com"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Age</label><input id="cAge" type="number" class="form-control" placeholder="25"></div>
          <div class="form-group"><label>Gender</label><select id="cGender" class="form-control"><option value="">Select...</option><option>Male</option><option>Female</option><option>Other</option></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>City</label><input id="cCity" class="form-control" placeholder="Lahore"></div>
          <div class="form-group"><label>Region</label><input id="cRegion" class="form-control" placeholder="Punjab"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Country</label><input id="cCountry" class="form-control" placeholder="Pakistan"></div>
          <div class="form-group"><label>Source</label><select id="cSource" class="form-control"><option value="web_search">Web Search</option><option value="meta">Meta</option><option value="tiktok">TikTok</option><option value="google">Google</option><option value="linkedin">LinkedIn</option></select></div>
        </div>
      </form>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button><button class="btn btn-primary" onclick="submitCustomer()">Add Customer</button></div>
  </div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header"><h3 id="detailTitle">Customer Detail</h3><button class="modal-close" onclick="closeModal('detailModal')">&times;</button></div>
    <div class="modal-body" id="detailBody"><div class="loading-spinner">Loading...</div></div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="shared.js"></script>
<script>
let allCustomers = [];
document.addEventListener('DOMContentLoaded', () => {
  const user = requireLogin(); if (!user) return;
  document.getElementById('sidebar').innerHTML = sidebarHTML('engagement.html');
  document.getElementById('topbar').innerHTML = topbarHTML('Customers');
  initPage('Customers');
  if (user.role === 'super_admin') { document.getElementById('tWrap').style.display = ''; loadTenants(); }
  loadCustomers();
});

async function loadTenants() { try { const t = await apiGet('/tenants'); const s = document.getElementById('cTenant'); t.forEach(x => s.innerHTML += '<option value="'+x.id+'">'+escapeHtml(x.name)+'</option>'); } catch(e){} }

async function loadCustomers() {
  try { allCustomers = await apiGet('/customers'); renderCustomers(allCustomers); }
  catch(e) { document.getElementById('page-body').innerHTML = '<div class="empty-state"><p>'+escapeHtml(e.message)+'</p><button class="btn btn-primary mt-2" onclick="loadCustomers()">Retry</button></div>'; }
}

function renderCustomers(list) {
  const p = document.getElementById('page-body');
  if (!list.length) { p.innerHTML = '<div class="page-header"><div class="page-header-left"><h1>Customers</h1></div><div class="page-header-actions"><button class="btn btn-primary" onclick="openModal(\'addModal\')">+ Add Customer</button></div></div><div class="empty-state"><div class="empty-icon">&#128101;</div><h3>No customers</h3><p>Add your first customer.</p></div>'; return; }

  let rows = '';
  list.forEach(c => {
    rows += '<tr><td class="fw-600">'+escapeHtml(c.name||'-')+'</td><td>'+escapeHtml(c.phone)+'</td><td>'+escapeHtml(c.email||'-')+'</td><td>'+escapeHtml(c.city||'-')+'</td><td>'+escapeHtml(c.region||'-')+'</td><td><span class="badge badge-neutral">'+escapeHtml(c.source||'web_search')+'</span></td><td>'+fmtDate(c.created_at)+'</td><td><button class="btn btn-secondary btn-sm" onclick="viewCustomer(\''+c.phone+'\',\''+escapeHtml(c.name||'Customer')+'\')">View</button></td></tr>';
  });

  p.innerHTML = `
    <div class="page-header">
      <div class="page-header-left"><h1>Customers</h1><p>${list.length} customers</p></div>
      <div class="page-header-actions">
        <input class="form-control" placeholder="Search..." style="width:220px" oninput="filterC(this.value)">
        <button class="btn btn-primary" onclick="openModal('addModal')">+ Add Customer</button>
      </div>
    </div>
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>City</th><th>Region</th><th>Source</th><th>Created</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;
}

function filterC(q) { const l=q.toLowerCase(); renderCustomers(allCustomers.filter(c=>(c.name||'').toLowerCase().includes(l)||(c.phone||'').includes(l)||(c.email||'').toLowerCase().includes(l)||(c.city||'').toLowerCase().includes(l))); }

async function submitCustomer() {
  const phone = document.getElementById('cPhone').value.trim(); if (!phone) { toast('Phone required','error'); return; }
  const body = { phone, name:document.getElementById('cName').value.trim()||undefined, email:document.getElementById('cEmail').value.trim()||undefined, age:parseInt(document.getElementById('cAge').value)||undefined, gender:document.getElementById('cGender').value||undefined, city:document.getElementById('cCity').value.trim()||undefined, region:document.getElementById('cRegion').value.trim()||undefined, country:document.getElementById('cCountry').value.trim()||undefined, source:document.getElementById('cSource').value };
  const t=document.getElementById('cTenant'); if(t.value) body.tenantId=t.value;
  try { await apiPost('/customers',body); toast('Customer added!','success'); closeModal('addModal'); document.getElementById('custForm').reset(); loadCustomers(); } catch(e) { toast(e.message,'error'); }
}

async function viewCustomer(phone, name) {
  document.getElementById('detailTitle').textContent = name;
  document.getElementById('detailBody').innerHTML = '<div class="loading-spinner">Loading engagement data...</div>';
  openModal('detailModal');
  try {
    const data = await apiGet('/bi/customer/'+encodeURIComponent(phone)+'/engagement');
    const c = data.customer || {};
    const e = data.engagement || {};
    const resps = data.recent_responses || [];
    const prefs = data.preferences || {};

    let respRows = '';
    resps.forEach(r => { respRows += '<tr><td>'+escapeHtml(r.campaign_name||'-')+'</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escapeHtml(r.response_text||'')+'</td><td>'+sentimentBadge(r.sentiment)+'</td><td><span class="badge badge-info">'+(r.intent||'-')+'</span></td><td>'+fmtDate(r.received_at)+'</td></tr>'; });

    document.getElementById('detailBody').innerHTML = `
      <div class="stats-grid mb-3">
        <div class="stat-card"><div class="stat-info"><div class="stat-label">Priority</div><div class="stat-value">${e.priority_score||50}/100</div></div></div>
        <div class="stat-card"><div class="stat-info"><div class="stat-label">Reply Rate</div><div class="stat-value">${fmtPct(e.reply_rate||0)}</div></div></div>
        <div class="stat-card"><div class="stat-info"><div class="stat-label">Conversion</div><div class="stat-value">${fmtPct(e.conversion_rate||0)}</div></div></div>
        <div class="stat-card"><div class="stat-info"><div class="stat-label">Campaigns</div><div class="stat-value">${e.total_campaigns_targeted||0}</div></div></div>
      </div>
      <div class="card mb-3"><div class="card-header"><h3>Info</h3></div><div class="card-body">
        <p><strong>Phone:</strong> ${escapeHtml(c.phone||'-')} | <strong>Email:</strong> ${escapeHtml(c.email||'-')} | <strong>City:</strong> ${escapeHtml(c.city||'-')} | <strong>Region:</strong> ${escapeHtml(c.region||'-')}</p>
        ${prefs.do_not_contact ? '<span class="badge badge-danger">Do Not Contact</span>' : ''}
        ${prefs.preferred_language ? '<p><strong>Language:</strong> '+escapeHtml(prefs.preferred_language)+'</p>' : ''}
      </div></div>
      ${resps.length ? '<div class="card"><div class="card-header"><h3>Recent Responses</h3></div><div class="table-wrap"><table><thead><tr><th>Campaign</th><th>Reply</th><th>Sentiment</th><th>Intent</th><th>Date</th></tr></thead><tbody>'+respRows+'</tbody></table></div></div>' : '<p class="text-muted">No responses yet.</p>'}
    `;
  } catch(e) { document.getElementById('detailBody').innerHTML = '<p class="text-danger">'+escapeHtml(e.message)+'</p>'; }
}
</script>
</body>
</html>
