<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — GeniSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .tenant-row td:first-child { font-weight: 600; }
  </style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar" id="topbar"></header>

    <div class="page" id="page-body">
      <div class="loading-spinner">Loading dashboard...</div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="shared.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
/* ── Plan badge colors ── */
const planColors = { Enterprise: 'purple', Pro: 'info', Business: 'success', Starter: 'warning', Free: 'neutral' };

/* ── Render dashboard ── */
function renderDashboard(data) {
  const page = document.getElementById('page-body');

  // Extract KPI values — platform uses 'overview', tenant uses 'kpis'
  const o = data.overview || data.kpis || data;
  const totalTenants    = o.total_tenants    ?? o.totalTenants    ?? (data.tenant ? 1 : 0);
  const totalProducts   = o.total_products   ?? o.product_count   ?? o.totalProducts   ?? 0;
  const totalCustomers  = o.total_customers  ?? o.customer_count  ?? o.totalCustomers  ?? 0;
  const totalCampaigns  = o.total_campaigns  ?? o.campaign_count  ?? o.totalCampaigns  ?? 0;
  const messagesSent    = o.total_messages_sent ?? o.messages_sent ?? o.messagesSent ?? 0;
  const totalReplies    = o.total_replies      ?? o.totalReplies  ?? 0;

  // Campaign performance data
  const campaigns        = data.recent_campaigns  ?? data.recentCampaigns  ?? data.campaigns ?? [];
  const tenants          = data.tenants            ?? data.recent_tenants   ?? data.recentTenants ?? [];

  // Sentiment — backend returns array [{sentiment, count}], convert to object
  const rawSentiment     = data.sentiment_breakdown ?? data.sentiment ?? data.sentimentDistribution ?? null;
  let sentimentData = rawSentiment;
  if (Array.isArray(rawSentiment)) {
    sentimentData = {};
    rawSentiment.forEach(s => { sentimentData[s.sentiment] = parseInt(s.count) || 0; });
  }

  page.innerHTML = `
    <!-- KPI Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon purple">&#127968;</div>
        <div class="stat-info">
          <div class="stat-label">Total Tenants</div>
          <div class="stat-value">${fmtNum(totalTenants)}</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">&#128230;</div>
        <div class="stat-info">
          <div class="stat-label">Total Products</div>
          <div class="stat-value">${fmtNum(totalProducts)}</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">&#128101;</div>
        <div class="stat-info">
          <div class="stat-label">Total Customers</div>
          <div class="stat-value">${fmtNum(totalCustomers)}</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">&#128228;</div>
        <div class="stat-info">
          <div class="stat-label">Total Campaigns</div>
          <div class="stat-value">${fmtNum(totalCampaigns)}</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">&#128172;</div>
        <div class="stat-info">
          <div class="stat-label">Messages Sent</div>
          <div class="stat-value">${fmtNum(messagesSent)}</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">&#128172;</div>
        <div class="stat-info">
          <div class="stat-label">Total Replies</div>
          <div class="stat-value">${fmtNum(totalReplies)}</div>
        </div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="grid-2 mb-3">
      <div class="card">
        <div class="card-header">
          <h3>&#128202; Campaign Performance</h3>
        </div>
        <div class="card-body">
          <div class="chart-wrap" style="height:260px">
            <canvas id="campaignChart"></canvas>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <h3>&#128200; Sentiment Distribution</h3>
        </div>
        <div class="card-body">
          <div class="chart-wrap" style="height:260px">
            <canvas id="sentimentChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Tenants Table -->
    <div class="card mb-3">
      <div class="card-header">
        <h3>&#127968; Tenants</h3>
        <a href="bi.html" class="btn btn-primary btn-sm">BI Drill-Down</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Plan</th>
              <th>Products</th>
              <th>Campaigns</th>
              <th>Customers</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tenantsTableBody">
            <tr><td colspan="6" class="text-center text-muted" style="padding:1.5rem;">No tenant data</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Recent Campaigns Table -->
    <div class="card">
      <div class="card-header">
        <h3>&#128228; Recent Campaigns</h3>
        <a href="campaigns.html" class="btn btn-secondary btn-sm">View All</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Campaign Name</th>
              <th>Tenant</th>
              <th>Status</th>
              <th>Sent</th>
              <th>Replies</th>
              <th>Conversions</th>
            </tr>
          </thead>
          <tbody id="campaignsTableBody">
            <tr><td colspan="6" class="text-center text-muted" style="padding:1.5rem;">No campaign data</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  `;

  // ── Render Tenants Table ──
  if (tenants.length > 0) {
    const tbody = document.getElementById('tenantsTableBody');
    tbody.innerHTML = '';
    tenants.forEach(t => {
      const name       = t.name       ?? t.tenant_name ?? t.business_name ?? '-';
      const plan       = t.plan       ?? t.subscription_plan ?? 'Free';
      const products   = t.products   ?? t.total_products ?? t.product_count ?? 0;
      const campCount  = t.campaigns  ?? t.total_campaigns ?? t.campaign_count ?? 0;
      const customers  = t.customers  ?? t.total_customers ?? t.customer_count ?? 0;
      const status     = t.status     ?? 'active';
      const planColor  = planColors[plan] || 'neutral';
      const statusBadge = status === 'active' ? 'success' : status === 'trial' ? 'warning' : 'neutral';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="fw-600">${name}</td>
        <td><span class="badge badge-${planColor}">${plan}</span></td>
        <td>${fmtNum(products)}</td>
        <td>${fmtNum(campCount)}</td>
        <td>${fmtNum(customers)}</td>
        <td><span class="badge badge-${statusBadge} badge-dot">${status}</span></td>
      `;
      tbody.appendChild(tr);
    });
  }

  // ── Render Campaigns Table ──
  if (campaigns.length > 0) {
    const tbody = document.getElementById('campaignsTableBody');
    tbody.innerHTML = '';
    campaigns.forEach(c => {
      const name        = c.name        ?? c.campaign_name ?? '-';
      const tenant      = c.tenant      ?? c.tenant_name ?? c.business_name ?? '-';
      const status      = c.status      ?? 'draft';
      const sent        = c.sent        ?? c.messages_sent ?? c.sent_count ?? 0;
      const replies     = c.replies     ?? c.reply_count ?? c.total_replies ?? 0;
      const conversions = c.conversions ?? c.conversion_count ?? 0;

      const statusMap = {
        active: 'success', completed: 'info', sent: 'success',
        draft: 'neutral', paused: 'warning', failed: 'danger',
        scheduled: 'warning',
      };
      const statusColor = statusMap[status] || 'neutral';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="fw-600">${name}</td>
        <td>${tenant}</td>
        <td><span class="badge badge-${statusColor} badge-dot">${status}</span></td>
        <td>${fmtNum(sent)}</td>
        <td>${fmtNum(replies)}</td>
        <td>${fmtNum(conversions)}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  // ── Campaign Performance Bar Chart ──
  const campCanvas = document.getElementById('campaignChart');
  if (campCanvas) {
    const recentCamps = campaigns.slice(0, 8);
    const labels = recentCamps.map(c => {
      const n = c.name ?? c.campaign_name ?? 'Campaign';
      return n.length > 15 ? n.substring(0, 15) + '...' : n;
    });
    const sentValues    = recentCamps.map(c => c.sent ?? c.messages_sent ?? c.sent_count ?? 0);
    const replyValues   = recentCamps.map(c => c.replies ?? c.reply_count ?? c.total_replies ?? 0);
    const convValues    = recentCamps.map(c => c.conversions ?? c.conversion_count ?? 0);

    new Chart(campCanvas.getContext('2d'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: 'Sent',
            data: sentValues,
            backgroundColor: GS.primary + 'cc',
            borderColor: GS.primary,
            borderWidth: 1,
            borderRadius: 4,
          },
          {
            label: 'Replies',
            data: replyValues,
            backgroundColor: GS.success + 'cc',
            borderColor: GS.success,
            borderWidth: 1,
            borderRadius: 4,
          },
          {
            label: 'Conversions',
            data: convValues,
            backgroundColor: GS.warning + 'cc',
            borderColor: GS.warning,
            borderWidth: 1,
            borderRadius: 4,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { position: 'top' } },
        scales: {
          x: { grid: { display: false } },
          y: { grid: { color: '#f0f0f0' }, ticks: { callback: v => fmtNum(v) } },
        },
      },
    });
  }

  // ── Sentiment Doughnut Chart ──
  const sentCanvas = document.getElementById('sentimentChart');
  if (sentCanvas) {
    const positive = sentimentData?.positive ?? sentimentData?.Positive ?? 0;
    const neutral  = sentimentData?.neutral  ?? sentimentData?.Neutral  ?? 0;
    const negative = sentimentData?.negative ?? sentimentData?.Negative ?? 0;
    const hasData  = positive + neutral + negative > 0;

    new Chart(sentCanvas.getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: ['Positive', 'Neutral', 'Negative'],
        datasets: [{
          data: hasData ? [positive, neutral, negative] : [1, 1, 1],
          backgroundColor: [GS.success + 'cc', GS.info + 'cc', GS.danger + 'cc'],
          borderColor: [GS.success, GS.info, GS.danger],
          borderWidth: 2,
          hoverOffset: 8,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '60%',
        plugins: {
          legend: { position: 'bottom' },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                if (!hasData) return 'No data yet';
                const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                const pct   = total > 0 ? ((ctx.raw / total) * 100).toFixed(1) : 0;
                return `${ctx.label}: ${ctx.raw} (${pct}%)`;
              }
            }
          }
        },
      },
    });
  }
}

/* ── Fetch dashboard data ── */
async function loadDashboard() {
  const user     = getUser();
  const role     = user?.role || 'admin';
  const tenantId = user?.tenant_id ?? user?.tenantId ?? user?.id;

  const path = role === 'super_admin'
    ? '/bi/saas-platform/dashboard'
    : `/bi/tenant/${tenantId}/dashboard`;

  try {
    const data = await apiGet(path);
    renderDashboard(data.data ?? data);
  } catch (err) {
    console.error('Dashboard load error:', err);
    const page = document.getElementById('page-body');
    page.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">&#9888;</div>
        <p>Unable to load dashboard data.</p>
        <p class="text-muted" style="font-size:.8rem;">${escapeHtml(err.message)}</p>
        <button class="btn btn-primary mt-2" onclick="loadDashboard()">Retry</button>
      </div>
    `;
  }
}

/* ── Boot ── */
document.addEventListener('DOMContentLoaded', () => {
  const user = requireLogin();
  if (!user) return;
  document.getElementById('sidebar').innerHTML = sidebarHTML('index.html');
  document.getElementById('topbar').innerHTML = topbarHTML('Dashboard');
  initPage('Dashboard');
  loadDashboard();
});
</script>
</body>
</html>
