<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — GeniSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page" id="page-body"><div class="loading-spinner">Loading...</div></div>
  </div>
</div>

<div class="modal-overlay" id="addTenantModal">
  <div class="modal">
    <div class="modal-header"><h3>Add Tenant</h3><button class="modal-close" onclick="closeModal('addTenantModal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Business Name *</label><input id="tName" class="form-control" required placeholder="Acme Corp"></div>
      <div class="form-group"><label>Email *</label><input id="tEmail" class="form-control" type="email" required placeholder="admin@acme.com"></div>
      <div class="form-row">
        <div class="form-group"><label>Phone</label><input id="tPhone" class="form-control" placeholder="+923001234567"></div>
        <div class="form-group"><label>Plan</label><select id="tPlan" class="form-control"><option value="starter">Starter</option><option value="pro">Pro</option><option value="business">Business</option><option value="enterprise">Enterprise</option></select></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('addTenantModal')">Cancel</button><button class="btn btn-primary" onclick="submitTenant()">Add Tenant</button></div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const user = requireLogin(); if (!user) return;
  document.getElementById('sidebar').innerHTML = sidebarHTML('settings.html');
  document.getElementById('topbar').innerHTML = topbarHTML('Settings');
  initPage('Settings');
  renderSettings();
});

async function renderSettings() {
  const page = document.getElementById('page-body');
  const user = getUser();
  const isSA = user && user.role === 'super_admin';

  try {
    const [me, waStatus, aiStatus, whStatus] = await Promise.all([
      apiGet('/auth/me'),
      apiGet('/whatsapp/status').catch(() => ({ configured:false, stub_mode:true })),
      apiGet('/ai/status').catch(() => ({ configured:false, stub_mode:true })),
      apiGet('/webhooks/status').catch(() => ({ configured:false, stub_mode:true }))
    ]);

    let tenantsTab = '';
    if (isSA) {
      tenantsTab = '<button class="tab" data-tab="tenants">Tenants</button>';
    }

    page.innerHTML = `
      <div class="page-header"><div class="page-header-left"><h1>Settings</h1></div></div>

      <div class="tabs" data-tab-group>
        <button class="tab active" data-tab="profile">Profile</button>
        <button class="tab" data-tab="api">API Configuration</button>
        ${tenantsTab}
      </div>

      <!-- Profile Tab -->
      <div data-panel="profile">
        <div class="card">
          <div class="card-header"><h3>Your Profile</h3></div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group"><label>Name</label><input class="form-control" value="${escapeHtml(me.name||'')}" disabled></div>
              <div class="form-group"><label>Email</label><input class="form-control" value="${escapeHtml(me.email||'')}" disabled></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Role</label><div style="margin-top:6px">${roleBadge(me.role)}</div></div>
              <div class="form-group"><label>Member Since</label><input class="form-control" value="${fmtDate(me.created_at)}" disabled></div>
            </div>
            ${me.tenant_id ? '<div class="form-group"><label>Tenant ID</label><input class="form-control" value="'+me.tenant_id+'" disabled></div>' : ''}
          </div>
        </div>
        <div class="card mt-2">
          <div class="card-header"><h3>Security</h3></div>
          <div class="card-body">
            <p class="text-muted mb-2">Your JWT token is valid for 7 days. To change your password, register again with the same email.</p>
            <button class="btn btn-danger" onclick="logout()">Sign Out</button>
          </div>
        </div>
      </div>

      <!-- API Tab -->
      <div data-panel="api" style="display:none">
        <div class="grid-3 mb-3">
          <div class="card">
            <div class="card-body" style="text-align:center;padding:24px">
              <div style="font-size:2rem;margin-bottom:8px">&#128172;</div>
              <h3>WhatsApp API</h3>
              <div class="mt-2">${waStatus.configured ? '<span class="badge badge-success badge-dot">Connected</span>' : '<span class="badge badge-warning badge-dot">Stub Mode</span>'}</div>
              ${waStatus.phone_number_id ? '<p class="text-muted mt-1">Phone: '+escapeHtml(waStatus.phone_number_id)+'</p>' : ''}
            </div>
          </div>
          <div class="card">
            <div class="card-body" style="text-align:center;padding:24px">
              <div style="font-size:2rem;margin-bottom:8px">&#129302;</div>
              <h3>Claude AI</h3>
              <div class="mt-2">${aiStatus.configured ? '<span class="badge badge-success badge-dot">Connected</span>' : '<span class="badge badge-warning badge-dot">Stub Mode</span>'}</div>
            </div>
          </div>
          <div class="card">
            <div class="card-body" style="text-align:center;padding:24px">
              <div style="font-size:2rem;margin-bottom:8px">&#128232;</div>
              <h3>n8n Webhooks</h3>
              <div class="mt-2">${whStatus.configured ? '<span class="badge badge-success badge-dot">Connected</span>' : '<span class="badge badge-warning badge-dot">Stub Mode</span>'}</div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h3>Configuration Guide</h3></div>
          <div class="card-body">
            <p class="mb-2">Add these environment variables in <strong>Railway Variables</strong> to activate each service:</p>
            <table><thead><tr><th>Variable</th><th>Service</th><th>Where to Get</th></tr></thead><tbody>
              <tr><td class="fw-600">WHATSAPP_API_TOKEN</td><td>WhatsApp</td><td>Meta Developer Portal → WhatsApp → Getting Started</td></tr>
              <tr><td class="fw-600">WHATSAPP_PHONE_NUMBER_ID</td><td>WhatsApp</td><td>Same page — Phone Number ID</td></tr>
              <tr><td class="fw-600">WHATSAPP_VERIFY_TOKEN</td><td>WhatsApp Webhook</td><td>You create this (any random string)</td></tr>
              <tr><td class="fw-600">ANTHROPIC_API_KEY</td><td>AI Analysis</td><td>console.anthropic.com → API Keys</td></tr>
              <tr><td class="fw-600">N8N_WEBHOOK_URL</td><td>n8n Automations</td><td>Your n8n instance webhook URL</td></tr>
            </tbody></table>
          </div>
        </div>
      </div>

      <!-- Tenants Tab (super_admin only) -->
      ${isSA ? '<div data-panel="tenants" style="display:none" id="tenantsPanel"></div>' : ''}
    `;

    initTabs();
    if (isSA) loadTenants();
  } catch(e) { page.innerHTML = '<div class="empty-state"><p>'+escapeHtml(e.message)+'</p><button class="btn btn-primary mt-2" onclick="renderSettings()">Retry</button></div>'; }
}

async function loadTenants() {
  const panel = document.getElementById('tenantsPanel');
  if (!panel) return;
  try {
    const tenants = await apiGet('/tenants');
    let rows = '';
    tenants.forEach(t => {
      rows += '<tr><td class="fw-600">'+escapeHtml(t.name)+'</td><td>'+escapeHtml(t.email)+'</td><td>'+escapeHtml(t.phone||'-')+'</td><td><span class="badge badge-primary">'+escapeHtml(t.plan)+'</span></td><td>'+fmtCurrency(t.mrr)+'</td><td>'+statusBadge(t.status)+'</td></tr>';
    });
    panel.innerHTML = `
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn btn-primary" onclick="openModal('addTenantModal')">+ Add Tenant</button></div>
      <div class="card"><div class="table-wrap"><table>
        <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Plan</th><th>MRR</th><th>Status</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="6" class="text-center text-muted">No tenants</td></tr>'}</tbody>
      </table></div></div>`;
  } catch(e) { panel.innerHTML = '<p class="text-danger">'+escapeHtml(e.message)+'</p>'; }
}

async function submitTenant() {
  const name = document.getElementById('tName').value.trim();
  const email = document.getElementById('tEmail').value.trim();
  if (!name || !email) { toast('Name and email required','error'); return; }
  try {
    await apiPost('/tenants', { name, email, phone:document.getElementById('tPhone').value.trim()||undefined, plan:document.getElementById('tPlan').value });
    toast('Tenant added!','success');
    closeModal('addTenantModal');
    loadTenants();
  } catch(e) { toast(e.message,'error'); }
}
</script>
</body>
</html>
