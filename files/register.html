<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — GeniSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: none; }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2c1654 0%, #667eea 60%, #764ba2 100%);
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .login-page::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: rgba(102, 126, 234, 0.15);
      top: -200px; right: -150px;
    }
    .login-page::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(118, 75, 162, 0.12);
      bottom: -150px; left: -100px;
    }

    .lp-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lp-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .lp-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.75rem;
    }

    .lp-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1E1E2E;
      line-height: 1.3;
    }

    .lp-subtitle {
      font-size: 0.85rem;
      color: #6B7280;
      margin-top: 0.3rem;
      line-height: 1.5;
      text-align: center;
    }

    .lp-form .form-group { margin-bottom: 1.25rem; text-align: left; }

    .lp-form .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #1E1E2E;
      margin-bottom: 0.45rem;
    }

    .lp-form .form-control {
      width: 100%;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      border: 1px solid #E2E6EA;
      border-radius: 6px;
      outline: none;
      transition: 0.2s ease;
      box-sizing: border-box;
      font-family: inherit;
    }
    .lp-form .form-control:focus {
      border-color: #6C5CE7;
      box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
    }

    .lp-btn {
      width: 100%;
      padding: 0.75rem 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
      font-family: inherit;
    }
    .lp-btn:hover { opacity: 0.9; box-shadow: 0 4px 16px rgba(102, 126, 234, 0.5); }
    .lp-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .lp-error {
      display: none;
      background: #FDF0ED;
      color: #E17055;
      padding: 0.65rem 1rem;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 500;
      margin-bottom: 1.25rem;
      border: 1px solid rgba(225, 112, 85, 0.15);
    }
    .lp-error.visible { display: block; }

    .lp-login {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #6B7280;
    }
    .lp-login a {
      color: #667eea;
      font-weight: 600;
      text-decoration: none;
    }
    .lp-login a:hover { text-decoration: underline; }

    .lp-footer {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.78rem;
      color: #9CA3AF;
    }

    .form-row {
      display: flex;
      gap: 1rem;
    }
    .form-row .form-group { flex: 1; }
  </style>
</head>
<body>
<div class="login-page">
  <div class="lp-card">
    <div class="lp-header">
      <div class="lp-icon">G</div>
      <div class="lp-title">GeniSearch</div>
      <div class="lp-subtitle">Create your account and start engaging customers</div>
    </div>

    <div class="lp-error" id="regError"></div>

    <form class="lp-form" id="regForm" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="name">Your Name</label>
        <input type="text" id="name" class="form-control" placeholder="e.g. Ahmed Khan" autocomplete="name" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@company.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="businessName">Business Name</label>
        <input type="text" id="businessName" class="form-control" placeholder="e.g. My Fashion Store" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Min 8 characters" autocomplete="new-password" required minlength="8">
      </div>

      <button type="submit" class="lp-btn" id="regBtn">Create Account</button>
    </form>

    <div class="lp-login">Already have an account? <a href="login.html">Log In</a></div>
    <div class="lp-footer">&copy; 2026 GeniSearch. All rights reserved.</div>
  </div>
</div>

<script>
const API_BASE = 'https://saaswhatsapp.up.railway.app/api';

function setAuth(token, user) {
  localStorage.setItem('gs_token', token);
  localStorage.setItem('gs_user', JSON.stringify(user));
}

(function() {
  try {
    if (localStorage.getItem('gs_token')) window.location.href = 'index.html';
  } catch (e) {}
})();

var form     = document.getElementById('regForm');
var errorEl  = document.getElementById('regError');
var regBtn   = document.getElementById('regBtn');

function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('visible'); }
function hideError() { errorEl.classList.remove('visible'); }

form.addEventListener('submit', async function(e) {
  e.preventDefault();
  hideError();

  var name         = document.getElementById('name').value.trim();
  var email        = document.getElementById('email').value.trim();
  var businessName = document.getElementById('businessName').value.trim();
  var password     = document.getElementById('password').value;

  if (!name || !email || !businessName || !password) {
    showError('Please fill in all fields.');
    return;
  }
  if (password.length < 8) {
    showError('Password must be at least 8 characters.');
    return;
  }

  regBtn.disabled = true;
  regBtn.textContent = 'Creating account...';

  try {
    var res = await fetch(API_BASE + '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, email: email, password: password, businessName: businessName }),
    });

    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Registration failed');

    setAuth(data.token, data.user);
    window.location.href = 'onboarding.html';
  } catch (err) {
    showError(err.message || 'Registration failed. Please try again.');
    regBtn.disabled = false;
    regBtn.textContent = 'Create Account';
  }
});
</script>
</body>
</html>
