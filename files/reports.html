<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — GeniSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page" id="page-body"><div class="loading-spinner">Loading...</div></div>
  </div>
</div>

<div class="modal-overlay" id="reportModal">
  <div class="modal" style="max-width:800px">
    <div class="modal-header"><h3 id="reportTitle">Report</h3><button class="modal-close" onclick="closeModal('reportModal')">&times;</button></div>
    <div class="modal-body" id="reportBody"><div class="loading-spinner">Generating...</div></div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('reportModal')">Close</button><button class="btn btn-primary" id="exportBtn" style="display:none" onclick="exportCSV()">Export CSV</button></div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="shared.js"></script>
<script>
let exportData = null;

document.addEventListener('DOMContentLoaded', () => {
  const user = requireLogin(); if (!user) return;
  document.getElementById('sidebar').innerHTML = sidebarHTML('reports.html');
  document.getElementById('topbar').innerHTML = topbarHTML('Reports');
  initPage('Reports');
  renderPage();
});

async function renderPage() {
  const page = document.getElementById('page-body');
  const [waStatus, aiStatus, whStatus] = await Promise.all([
    apiGet('/whatsapp/status').catch(() => ({ stub_mode: true })),
    apiGet('/ai/status').catch(() => ({ stub_mode: true })),
    apiGet('/webhooks/status').catch(() => ({ stub_mode: true }))
  ]);

  page.innerHTML = `
    <div class="page-header"><div class="page-header-left"><h1>Reports</h1><p>Generate and export data reports</p></div></div>

    <div class="grid-3 mb-3">
      <div class="card" style="cursor:pointer" onclick="genReport('platform')">
        <div class="card-body" style="text-align:center;padding:28px">
          <div style="font-size:2.2rem;margin-bottom:8px">&#128202;</div>
          <h3>Platform Overview</h3>
          <p class="text-muted" style="font-size:.85rem">Tenants, campaigns, messages, MRR</p>
          <button class="btn btn-primary btn-sm mt-2">Generate</button>
        </div>
      </div>
      <div class="card" style="cursor:pointer" onclick="genReport('campaigns')">
        <div class="card-body" style="text-align:center;padding:28px">
          <div style="font-size:2.2rem;margin-bottom:8px">&#128228;</div>
          <h3>Campaign Performance</h3>
          <p class="text-muted" style="font-size:.85rem">All campaigns with metrics</p>
          <button class="btn btn-primary btn-sm mt-2">Generate</button>
        </div>
      </div>
      <div class="card" style="cursor:pointer" onclick="genReport('customers')">
        <div class="card-body" style="text-align:center;padding:28px">
          <div style="font-size:2.2rem;margin-bottom:8px">&#128101;</div>
          <h3>Customer Report</h3>
          <p class="text-muted" style="font-size:.85rem">All customers with details</p>
          <button class="btn btn-primary btn-sm mt-2">Generate</button>
        </div>
      </div>
      <div class="card" style="cursor:pointer" onclick="genReport('products')">
        <div class="card-body" style="text-align:center;padding:28px">
          <div style="font-size:2.2rem;margin-bottom:8px">&#128230;</div>
          <h3>Product Report</h3>
          <p class="text-muted" style="font-size:.85rem">All products with targeting</p>
          <button class="btn btn-primary btn-sm mt-2">Generate</button>
        </div>
      </div>
      <div class="card" style="cursor:pointer" onclick="triggerDailySummary()">
        <div class="card-body" style="text-align:center;padding:28px">
          <div style="font-size:2.2rem;margin-bottom:8px">&#128232;</div>
          <h3>Daily Summary</h3>
          <p class="text-muted" style="font-size:.85rem">Trigger n8n daily summary webhook</p>
          <button class="btn btn-success btn-sm mt-2">Trigger</button>
        </div>
      </div>
      <div class="card">
        <div class="card-body" style="text-align:center;padding:28px">
          <div style="font-size:2.2rem;margin-bottom:8px">&#9881;</div>
          <h3>Service Status</h3>
          <div class="mt-2" style="text-align:left">
            <p>WhatsApp: ${waStatus.stub_mode ? '<span class="badge badge-warning">Stub</span>' : '<span class="badge badge-success">Active</span>'}</p>
            <p>AI Analysis: ${aiStatus.stub_mode ? '<span class="badge badge-warning">Stub</span>' : '<span class="badge badge-success">Active</span>'}</p>
            <p>Webhooks: ${whStatus.stub_mode ? '<span class="badge badge-warning">Stub</span>' : '<span class="badge badge-success">Active</span>'}</p>
          </div>
        </div>
      </div>
    </div>
  `;
}

async function genReport(type) {
  const titles = { platform:'Platform Overview', campaigns:'Campaign Performance', customers:'Customer Report', products:'Product Report' };
  document.getElementById('reportTitle').textContent = titles[type] || 'Report';
  document.getElementById('reportBody').innerHTML = '<div class="loading-spinner">Generating report...</div>';
  document.getElementById('exportBtn').style.display = 'none';
  exportData = null;
  openModal('reportModal');

  try {
    let html = '', data = [];
    if (type === 'platform') {
      const d = await apiGet('/bi/saas-platform/dashboard');
      const o = d.overview || {};
      html = '<div class="stats-grid mb-3"><div class="stat-card"><div class="stat-info"><div class="stat-label">Tenants</div><div class="stat-value">'+fmtNum(o.total_tenants)+'</div></div></div><div class="stat-card"><div class="stat-info"><div class="stat-label">Products</div><div class="stat-value">'+fmtNum(o.total_products)+'</div></div></div><div class="stat-card"><div class="stat-info"><div class="stat-label">Customers</div><div class="stat-value">'+fmtNum(o.total_customers)+'</div></div></div><div class="stat-card"><div class="stat-info"><div class="stat-label">Campaigns</div><div class="stat-value">'+fmtNum(o.total_campaigns)+'</div></div></div><div class="stat-card"><div class="stat-info"><div class="stat-label">MRR</div><div class="stat-value">'+fmtCurrency(o.total_mrr)+'</div></div></div></div>';
      const tenants = d.tenants || [];
      html += '<table><thead><tr><th>Tenant</th><th>Plan</th><th>Products</th><th>Campaigns</th><th>Customers</th></tr></thead><tbody>';
      tenants.forEach(t => { html += '<tr><td>'+escapeHtml(t.name)+'</td><td>'+escapeHtml(t.plan)+'</td><td>'+t.product_count+'</td><td>'+t.campaign_count+'</td><td>'+t.customer_count+'</td></tr>'; });
      html += '</tbody></table>';
      data = tenants.map(t => ({ Name:t.name, Plan:t.plan, Products:t.product_count, Campaigns:t.campaign_count, Customers:t.customer_count }));
    } else if (type === 'campaigns') {
      const camps = await apiGet('/campaigns');
      html = '<table><thead><tr><th>Name</th><th>Status</th><th>Sent</th><th>Replies</th><th>Conversions</th><th>Created</th></tr></thead><tbody>';
      camps.forEach(c => { html += '<tr><td>'+escapeHtml(c.name)+'</td><td>'+c.status+'</td><td>'+c.sent_count+'</td><td>'+c.reply_count+'</td><td>'+c.conversion_count+'</td><td>'+fmtDate(c.created_at)+'</td></tr>'; });
      html += '</tbody></table>';
      data = camps.map(c => ({ Name:c.name, Status:c.status, Sent:c.sent_count, Replies:c.reply_count, Conversions:c.conversion_count, Created:fmtDate(c.created_at) }));
    } else if (type === 'customers') {
      const custs = await apiGet('/customers');
      html = '<table><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>City</th><th>Source</th></tr></thead><tbody>';
      custs.forEach(c => { html += '<tr><td>'+escapeHtml(c.name||'-')+'</td><td>'+escapeHtml(c.phone)+'</td><td>'+escapeHtml(c.email||'-')+'</td><td>'+escapeHtml(c.city||'-')+'</td><td>'+escapeHtml(c.source||'-')+'</td></tr>'; });
      html += '</tbody></table>';
      data = custs.map(c => ({ Name:c.name, Phone:c.phone, Email:c.email, City:c.city, Source:c.source }));
    } else if (type === 'products') {
      const prods = await apiGet('/products');
      html = '<table><thead><tr><th>Name</th><th>Price</th><th>Region</th><th>City</th><th>Status</th></tr></thead><tbody>';
      prods.forEach(p => { html += '<tr><td>'+escapeHtml(p.name)+'</td><td>'+(p.price||'-')+'</td><td>'+escapeHtml(p.region||'-')+'</td><td>'+escapeHtml(p.city||'-')+'</td><td>'+escapeHtml(p.status||'active')+'</td></tr>'; });
      html += '</tbody></table>';
      data = prods.map(p => ({ Name:p.name, Price:p.price, Region:p.region, City:p.city, Status:p.status }));
    }
    document.getElementById('reportBody').innerHTML = '<div class="table-wrap">'+html+'</div>';
    if (data.length) { exportData = data; document.getElementById('exportBtn').style.display = ''; }
  } catch(e) { document.getElementById('reportBody').innerHTML = '<p class="text-danger">'+escapeHtml(e.message)+'</p>'; }
}

function exportCSV() {
  if (!exportData || !exportData.length) return;
  const headers = Object.keys(exportData[0]);
  const csv = [headers.join(',')].concat(exportData.map(row => headers.map(h => '"'+(row[h]||'')+'"').join(','))).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'report.csv'; a.click();
  toast('CSV downloaded!','success');
}

async function triggerDailySummary() {
  try {
    const r = await apiPost('/webhooks/daily-summary', {});
    toast('Daily summary sent! Campaigns today: '+(r.data?.campaigns_sent_today||0), 'success');
  } catch(e) { toast(e.message, 'error'); }
}
</script>
</body>
</html>
