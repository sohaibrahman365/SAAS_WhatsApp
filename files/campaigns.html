<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campaigns — GeniSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page" id="page-body"><div class="loading-spinner">Loading campaigns...</div></div>
  </div>
</div>

<div class="modal-overlay" id="createModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header"><h3>Create Campaign</h3><button class="modal-close" onclick="closeModal('createModal')">&times;</button></div>
    <div class="modal-body">
      <form id="campaignForm">
        <div id="cTenantWrap" style="display:none" class="form-group"><label>Tenant</label><select id="cTenant" class="form-control"><option value="">Select...</option></select></div>
        <div class="form-group"><label>Campaign Name *</label><input id="cName" class="form-control" required placeholder="Summer Sale 2026"></div>
        <div class="form-row">
          <div class="form-group"><label>Product</label><select id="cProduct" class="form-control"><option value="">Select product...</option></select></div>
          <div class="form-group"><label>Segment</label><select id="cSegment" class="form-control"><option value="all">All Customers</option><option value="high_priority">High Priority</option><option value="new">New</option><option value="inactive">Inactive</option></select></div>
        </div>
        <div class="form-group"><label>Message Template</label><textarea id="cMsg" class="form-control" rows="3" placeholder="Hi {{customer_name}}, check out {{product_name}}!"></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Region</label><input id="cRegion" class="form-control" placeholder="South Asia"></div>
          <div class="form-group"><label>Country</label><input id="cCountry" class="form-control" placeholder="Pakistan"></div>
        </div>
        <div class="form-group"><label>City</label><input id="cCity" class="form-control" placeholder="Lahore"></div>
      </form>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('createModal')">Cancel</button><button class="btn btn-primary" onclick="submitCampaign()">Create</button></div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header"><h3>Edit Campaign</h3><button class="modal-close" onclick="closeModal('editModal')">&times;</button></div>
    <div class="modal-body">
      <form id="editForm">
        <input type="hidden" id="eId">
        <div class="form-group"><label>Campaign Name *</label><input id="eName" class="form-control" required></div>
        <div class="form-row">
          <div class="form-group"><label>Product</label><select id="eProduct" class="form-control"><option value="">Select product...</option></select></div>
          <div class="form-group"><label>Segment</label><select id="eSegment" class="form-control"><option value="all">All Customers</option><option value="high_priority">High Priority</option><option value="new">New</option><option value="inactive">Inactive</option></select></div>
        </div>
        <div class="form-group"><label>Message Template</label><textarea id="eMsg" class="form-control" rows="3"></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Region</label><input id="eRegion" class="form-control"></div>
          <div class="form-group"><label>Country</label><input id="eCountry" class="form-control"></div>
        </div>
        <div class="form-group"><label>City</label><input id="eCity" class="form-control"></div>
      </form>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('editModal')">Cancel</button><button class="btn btn-primary" onclick="submitEdit()">Save Changes</button></div>
  </div>
</div>

<div class="modal-overlay" id="launchModal">
  <div class="modal">
    <div class="modal-header"><h3>Launch Campaign</h3><button class="modal-close" onclick="closeModal('launchModal')">&times;</button></div>
    <div class="modal-body" id="launchBody"><p>Ready to launch?</p></div>
    <div class="modal-footer" id="launchFoot"><button class="btn btn-secondary" onclick="closeModal('launchModal')">Cancel</button><button class="btn btn-success" id="launchBtn" onclick="doLaunch()">Launch Now</button></div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="shared.js"></script>
<script>
let allCampaigns = [], launchId = null;
document.addEventListener('DOMContentLoaded', () => {
  const user = requireLogin(); if (!user) return;
  document.getElementById('sidebar').innerHTML = sidebarHTML('campaigns.html');
  document.getElementById('topbar').innerHTML = topbarHTML('Campaigns');
  initPage('Campaigns');
  if (user.role === 'super_admin') { document.getElementById('cTenantWrap').style.display = ''; loadTenants(); }
  loadProducts(); loadCampaigns();
});

async function loadTenants() { try { const t = await apiGet('/tenants'); const s = document.getElementById('cTenant'); t.forEach(x => s.innerHTML += '<option value="'+x.id+'">'+escapeHtml(x.name)+'</option>'); } catch(e){} }
async function loadProducts() { try { const p = await apiGet('/products'); const s = document.getElementById('cProduct'); p.forEach(x => s.innerHTML += '<option value="'+x.id+'">'+escapeHtml(x.name)+'</option>'); } catch(e){} }

async function loadCampaigns() {
  try { allCampaigns = await apiGet('/campaigns'); renderCampaigns(allCampaigns); }
  catch(e) { document.getElementById('page-body').innerHTML = '<div class="empty-state"><p>'+escapeHtml(e.message)+'</p><button class="btn btn-primary mt-2" onclick="loadCampaigns()">Retry</button></div>'; }
}

function renderCampaigns(list) {
  const p = document.getElementById('page-body');
  if (!list.length) { p.innerHTML = '<div class="page-header"><div class="page-header-left"><h1>Campaigns</h1></div><div class="page-header-actions"><button class="btn btn-primary" onclick="openModal(\'createModal\')">+ Create Campaign</button></div></div><div class="empty-state"><div class="empty-icon">&#128228;</div><h3>No campaigns</h3><p>Create your first campaign.</p></div>'; return; }

  let rows = '';
  list.forEach(c => {
    const canLaunch = ['draft','scheduled'].includes(c.status);
    const launch = canLaunch ? '<button class="btn btn-success btn-sm" onclick="showLaunch(\''+c.id+'\',\''+escapeHtml(c.name).replace(/'/g,"\\'")+'\')">Launch</button>' : '';
    const edit = canLaunch ? '<button class="btn btn-secondary btn-sm" onclick="showEdit(\''+c.id+'\')">Edit</button>' : '';
    const opts = ['draft','active','paused','completed'].map(s => '<option value="'+s+'" '+(s===c.status?'selected':'')+'>'+s+'</option>').join('');
    rows += '<tr><td class="fw-600">'+escapeHtml(c.name)+'</td><td>'+statusBadge(c.status)+'</td><td>'+fmtNum(c.sent_count)+'</td><td>'+fmtNum(c.reply_count)+'</td><td>'+fmtNum(c.conversion_count)+'</td><td>'+fmtDate(c.created_at)+'</td><td style="display:flex;gap:6px;align-items:center"><a href="bi.html?campaign='+c.id+'" class="btn btn-secondary btn-sm">View</a>'+edit+launch+'<select class="form-control" style="width:auto;padding:3px 6px;font-size:.75rem" onchange="chgStatus(\''+c.id+'\',this.value)">'+opts+'</select></td></tr>';
  });
  p.innerHTML = '<div class="page-header"><div class="page-header-left"><h1>Campaigns</h1><p>'+list.length+' campaigns</p></div><div class="page-header-actions"><input class="form-control" placeholder="Search..." style="width:220px" oninput="filterC(this.value)"><button class="btn btn-primary" onclick="openModal(\'createModal\')">+ Create Campaign</button></div></div><div class="card"><div class="table-wrap"><table><thead><tr><th>Name</th><th>Status</th><th>Sent</th><th>Replies</th><th>Conversions</th><th>Created</th><th>Actions</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function filterC(q) { const l=q.toLowerCase(); renderCampaigns(allCampaigns.filter(c=>(c.name||'').toLowerCase().includes(l))); }

async function submitCampaign() {
  const name = document.getElementById('cName').value.trim(); if (!name) { toast('Name required','error'); return; }
  const body = { name, product_id:document.getElementById('cProduct').value||undefined, message_template:document.getElementById('cMsg').value.trim()||undefined, target_segment:document.getElementById('cSegment').value, region:document.getElementById('cRegion').value.trim()||undefined, country:document.getElementById('cCountry').value.trim()||undefined, city:document.getElementById('cCity').value.trim()||undefined };
  const t=document.getElementById('cTenant'); if(t.value) body.tenantId=t.value;
  try { await apiPost('/campaigns',body); toast('Created!','success'); closeModal('createModal'); document.getElementById('campaignForm').reset(); loadCampaigns(); } catch(e) { toast(e.message,'error'); }
}

async function showEdit(id) {
  try {
    const c = await apiGet('/campaigns/' + id);
    document.getElementById('eId').value = c.id;
    document.getElementById('eName').value = c.name || '';
    document.getElementById('eMsg').value = c.message_template || '';
    document.getElementById('eRegion').value = c.region || '';
    document.getElementById('eCountry').value = c.country || '';
    document.getElementById('eCity').value = c.city || '';
    // Populate product dropdown
    const eProd = document.getElementById('eProduct');
    eProd.innerHTML = '<option value="">Select product...</option>';
    try { const prods = await apiGet('/products'); prods.forEach(p => eProd.innerHTML += '<option value="'+p.id+'"'+(p.id===c.product_id?' selected':'')+'>'+escapeHtml(p.name)+'</option>'); } catch(e){}
    if (c.target_segment) document.getElementById('eSegment').value = c.target_segment;
    openModal('editModal');
  } catch(e) { toast(e.message, 'error'); }
}

async function submitEdit() {
  const id = document.getElementById('eId').value;
  const body = {
    name: document.getElementById('eName').value.trim(),
    message_template: document.getElementById('eMsg').value.trim(),
    product_id: document.getElementById('eProduct').value || null,
    target_segment: document.getElementById('eSegment').value,
    region: document.getElementById('eRegion').value.trim() || null,
    country: document.getElementById('eCountry').value.trim() || null,
    city: document.getElementById('eCity').value.trim() || null
  };
  if (!body.name) { toast('Name required', 'error'); return; }
  try { await apiPut('/campaigns/' + id, body); toast('Campaign updated!', 'success'); closeModal('editModal'); loadCampaigns(); } catch(e) { toast(e.message, 'error'); }
}

function showLaunch(id,name) { launchId=id; document.getElementById('launchBody').innerHTML='<p>Launch <strong>'+escapeHtml(name)+'</strong>?</p><p class="text-muted">Messages will be sent to all matching customers.</p>'; document.getElementById('launchBtn').disabled=false; document.getElementById('launchBtn').textContent='Launch Now'; openModal('launchModal'); }

async function doLaunch() {
  document.getElementById('launchBtn').disabled=true; document.getElementById('launchBtn').textContent='Launching...';
  try { const r = await apiPost('/campaigns/'+launchId+'/launch',{}); var errMsg = r.error ? '<p style="color:var(--danger);font-size:0.85rem;margin-top:0.5rem">Error: '+escapeHtml(r.error)+'</p>' : ''; document.getElementById('launchBody').innerHTML='<div style="text-align:center"><div style="font-size:2rem">&#127881;</div><h3>Launched!</h3><p>Sent: <strong>'+r.sent+'</strong> | Failed: <strong>'+r.failed+'</strong> | Total: <strong>'+r.total+'</strong></p>'+errMsg+'</div>'; document.getElementById('launchFoot').innerHTML='<button class="btn btn-primary" onclick="closeModal(\'launchModal\');loadCampaigns()">Done</button>'; toast('Launched!','success'); }
  catch(e) { toast(e.message,'error'); document.getElementById('launchBtn').disabled=false; document.getElementById('launchBtn').textContent='Launch Now'; }
}

async function chgStatus(id,s) { try { await apiPatch('/campaigns/'+id+'/status',{status:s}); toast('Status: '+s,'success'); loadCampaigns(); } catch(e) { toast(e.message,'error'); } }
</script>
</body>
</html>
