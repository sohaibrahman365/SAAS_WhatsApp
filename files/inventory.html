<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — GeniSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page" id="page-body"><div class="loading-spinner">Loading products...</div></div>
  </div>
</div>

<div class="modal-overlay" id="addProductModal">
  <div class="modal" style="max-width:580px">
    <div class="modal-header"><h3>Add Product</h3><button class="modal-close" onclick="closeModal('addProductModal')">&times;</button></div>
    <div class="modal-body">
      <form id="productForm">
        <div id="tenantSelectWrap" style="display:none" class="form-group">
          <label>Tenant</label><select id="pTenant" class="form-control"><option value="">Select tenant...</option></select>
        </div>
        <div class="form-group"><label>Product Name *</label><input id="pName" class="form-control" required placeholder="e.g. Premium Cotton Shirt"></div>
        <div class="form-row">
          <div class="form-group"><label>Price</label><input id="pPrice" type="number" step="0.01" class="form-control" placeholder="0.00"></div>
          <div class="form-group"><label>Categories</label><input id="pCategories" class="form-control" placeholder="Fashion, Formal (comma-sep)"></div>
        </div>
        <div class="form-group"><label>Description</label><textarea id="pDesc" class="form-control" rows="2" placeholder="Product description..."></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Region</label><input id="pRegion" class="form-control" placeholder="South Asia"></div>
          <div class="form-group"><label>Country</label><input id="pCountry" class="form-control" placeholder="Pakistan"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>City</label><input id="pCity" class="form-control" placeholder="Lahore"></div>
          <div class="form-group"><label>Image URL</label><input id="pImage" class="form-control" placeholder="https://..."></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Target Age Min</label><input id="pAgeMin" type="number" class="form-control" placeholder="18"></div>
          <div class="form-group"><label>Target Age Max</label><input id="pAgeMax" type="number" class="form-control" placeholder="65"></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('addProductModal')">Cancel</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitProduct()">Add Product</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="shared.js"></script>
<script>
let allProducts = [];
document.addEventListener('DOMContentLoaded', () => {
  const user = requireLogin(); if (!user) return;
  document.getElementById('sidebar').innerHTML = sidebarHTML('inventory.html');
  document.getElementById('topbar').innerHTML = topbarHTML('Products');
  initPage('Products');
  if (user.role === 'super_admin') { document.getElementById('tenantSelectWrap').style.display = ''; loadTenants(); }
  loadProducts();
});

async function loadTenants() {
  try { const t = await apiGet('/tenants'); const s = document.getElementById('pTenant'); t.forEach(x => { s.innerHTML += '<option value="'+x.id+'">'+escapeHtml(x.name)+'</option>'; }); } catch(e){}
}

async function loadProducts() {
  try { allProducts = await apiGet('/products'); renderProducts(allProducts); }
  catch(e) { document.getElementById('page-body').innerHTML = '<div class="empty-state"><div class="empty-icon">&#9888;</div><p>'+escapeHtml(e.message)+'</p><button class="btn btn-primary mt-2" onclick="loadProducts()">Retry</button></div>'; }
}

function renderProducts(list) {
  const p = document.getElementById('page-body');
  if (!list.length) {
    p.innerHTML = '<div class="page-header"><div class="page-header-left"><h1>Products</h1><p>0 products</p></div><div class="page-header-actions"><button class="btn btn-primary" onclick="openModal(\'addProductModal\')">+ Add Product</button></div></div><div class="empty-state"><div class="empty-icon">&#128230;</div><h3>No products yet</h3><p>Add your first product to get started.</p></div>';
    return;
  }
  let rows = '';
  list.forEach(x => {
    const cats = (x.categories||[]).map(c => '<span class="badge badge-primary" style="margin:0 3px 3px 0">'+escapeHtml(c)+'</span>').join('');
    rows += '<tr><td class="fw-600">'+escapeHtml(x.name)+'</td><td>'+(x.price?fmtCurrency(x.price):'-')+'</td><td>'+escapeHtml(x.region||'-')+'</td><td>'+escapeHtml(x.city||'-')+'</td><td>'+(cats||'-')+'</td><td>'+statusBadge(x.status||'active')+'</td><td>'+fmtDate(x.created_at)+'</td><td><a href="bi.html?product='+x.id+'" class="btn btn-secondary btn-sm">View</a></td></tr>';
  });
  p.innerHTML = '<div class="page-header"><div class="page-header-left"><h1>Products</h1><p>'+list.length+' products</p></div><div class="page-header-actions"><input class="form-control" placeholder="Search..." style="width:220px" oninput="filterProducts(this.value)"><button class="btn btn-primary" onclick="openModal(\'addProductModal\')">+ Add Product</button></div></div><div class="card"><div class="table-wrap"><table><thead><tr><th>Name</th><th>Price</th><th>Region</th><th>City</th><th>Categories</th><th>Status</th><th>Created</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function filterProducts(q) { const l = q.toLowerCase(); renderProducts(allProducts.filter(x => (x.name||'').toLowerCase().includes(l)||(x.region||'').toLowerCase().includes(l)||(x.city||'').toLowerCase().includes(l))); }

async function submitProduct() {
  const name = document.getElementById('pName').value.trim();
  if (!name) { toast('Name is required','error'); return; }
  const body = { name, price:parseFloat(document.getElementById('pPrice').value)||undefined, description:document.getElementById('pDesc').value.trim()||undefined, region:document.getElementById('pRegion').value.trim()||undefined, country:document.getElementById('pCountry').value.trim()||undefined, city:document.getElementById('pCity').value.trim()||undefined, image_url:document.getElementById('pImage').value.trim()||undefined, target_age_min:parseInt(document.getElementById('pAgeMin').value)||undefined, target_age_max:parseInt(document.getElementById('pAgeMax').value)||undefined, categories:document.getElementById('pCategories').value.split(',').map(s=>s.trim()).filter(Boolean) };
  const t = document.getElementById('pTenant'); if (t.value) body.tenantId = t.value;
  try { await apiPost('/products', body); toast('Product added!','success'); closeModal('addProductModal'); document.getElementById('productForm').reset(); loadProducts(); }
  catch(e) { toast(e.message,'error'); }
}
</script>
</body>
</html>
